<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="no-referrer">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src blob: data:; font-src 'self' data:; connect-src 'none'; media-src 'none'; worker-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'">
<title>Blotter</title>
<style>
  :root {
    --acc-dark: #0a246a;
    --acc-light: #a6caf0;
    --win-face: #c0c0c0;
    --win-light: #ffffff;
    --win-mid: #dfdfdf;
    --win-dark: #808080;
    --win-black: #0a0a0a;
    --paper: #ffffff;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100%;
    background: var(--win-face);
    color: #000;
    font-family: Tahoma, "MS Sans Serif", Geneva, sans-serif;
    font-size: 12px;
  }

  body {
    padding: 0;
  }

  button,
  input,
  select,
  output {
    font: inherit;
  }

  .blotter-app {
    min-height: 100vh;
    background: var(--win-face);
  }

  .window-shell {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    background: var(--win-face);
    box-shadow:
      inset -1px -1px 0 var(--win-black),
      inset 1px 1px 0 var(--win-light),
      inset -2px -2px 0 var(--win-dark),
      inset 2px 2px 0 var(--win-mid);
  }

  .titlebar {
    height: 20px;
    padding: 0 3px 0 4px;
    display: flex;
    align-items: center;
    gap: 6px;
    color: #fff;
    font-weight: bold;
    background: linear-gradient(90deg, var(--acc-dark), var(--acc-light) 92%);
  }

  .titlebar-text {
    flex: 1;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }

  .window-buttons {
    display: flex;
    gap: 2px;
  }

  .window-button {
    width: 16px;
    height: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #000;
    background: var(--win-face);
    font-family: "Marlett", Tahoma, sans-serif;
    font-size: 10px;
    line-height: 1;
    box-shadow:
      inset -1px -1px 0 var(--win-black),
      inset 1px 1px 0 var(--win-light),
      inset -1px -1px 0 var(--win-dark),
      inset 1px 1px 0 var(--win-mid);
  }

  .menubar {
    display: flex;
    gap: 12px;
    padding: 2px 6px;
    border-bottom: 1px solid var(--win-dark);
    background: var(--win-face);
    font-size: 11px;
  }

  .menu-item:first-letter,
  legend::first-letter {
    text-decoration: underline;
  }

  .window-body {
    flex: 1;
    display: grid;
    gap: 10px;
    padding: 10px;
    min-height: 0;
  }

  .tool-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: flex-end;
  }

  fieldset {
    margin: 0;
    padding: 10px 10px 12px;
    border: none;
    background: var(--win-face);
    box-shadow:
      inset 1px 1px 0 var(--win-dark),
      inset -1px -1px 0 var(--win-light);
  }

  legend {
    padding: 0 4px;
  }

  .controls {
    display: grid;
    grid-template-columns: repeat(2, minmax(180px, 1fr));
    gap: 10px 14px;
  }

  .control {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 4px 8px;
    align-items: center;
  }

  .control input,
  .control select {
    grid-column: 1 / -1;
    width: 100%;
  }

  .control output,
  .status {
    padding: 2px 4px;
    background: #fff;
    box-shadow:
      inset 1px 1px 0 var(--win-dark),
      inset -1px -1px 0 var(--win-light);
  }

  .control output {
    min-width: 48px;
    text-align: right;
  }

  .bottom-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }

  .win-btn {
    padding: 4px 12px;
    border: none;
    cursor: pointer;
    color: #000;
    background: var(--win-face);
    box-shadow:
      inset -1px -1px 0 var(--win-black),
      inset 1px 1px 0 var(--win-light),
      inset -2px -2px 0 var(--win-dark),
      inset 2px 2px 0 var(--win-mid);
  }

  .win-btn:active {
    box-shadow:
      inset 1px 1px 0 var(--win-black),
      inset -1px -1px 0 var(--win-light),
      inset 2px 2px 0 var(--win-dark),
      inset -2px -2px 0 var(--win-mid);
  }

  .status {
    margin-left: auto;
    min-width: 180px;
  }

  .preview-window {
    display: grid;
    gap: 0;
  }

  .preview-title {
    padding: 2px 6px;
    color: #fff;
    font-weight: bold;
    background: linear-gradient(90deg, var(--acc-dark), var(--acc-light) 92%);
  }

  .canvas-wrap {
    padding: 7px;
    background: var(--win-face);
    box-shadow:
      inset 1px 1px 0 var(--win-dark),
      inset -1px -1px 0 var(--win-light);
  }

  #blotterCanvas {
    display: block;
    width: 100%;
    aspect-ratio: 1;
    background: var(--paper);
    image-rendering: pixelated;
  }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  @media (min-width: 900px) {
    .window-body {
      grid-template-columns: minmax(0, 1.1fr) minmax(300px, 0.9fr);
      align-items: start;
    }

    .preview-window {
      height: 100%;
      align-content: start;
    }
  }

  @media (max-width: 699px) {
    .controls {
      grid-template-columns: 1fr;
    }

    .status {
      width: 100%;
      margin-left: 0;
    }
  }
</style>
</head>
<body>
  <div id="blotter-generator" class="blotter-app">
    <section class="window-shell" aria-label="Blotter art generator">
      <div class="titlebar">
        <span class="titlebar-text">Blotter</span>
        <span class="window-buttons" aria-hidden="true">
          <span class="window-button">0</span>
          <span class="window-button">1</span>
          <span class="window-button">r</span>
        </span>
      </div>
      <div class="menubar" aria-label="Application menu">
        <span class="menu-item">File</span>
        <span class="menu-item">View</span>
      </div>
      <div class="window-body">
        <div class="controls-pane">
          <input id="imageInput" class="sr-only" type="file" accept="image/*">
          <fieldset>
            <legend>Blotter settings</legend>
            <div class="controls" aria-label="Blotter style controls">
              <div class="control">
                <label for="thickness">Perforation thickness</label>
                <output id="thicknessOut">0.6 px</output>
                <input id="thickness" type="range" min="0.1" max="1" step="0.1" value="0.6">
              </div>
              <div class="control">
                <label for="depth">Punch depth</label>
                <output id="depthOut">4 px</output>
                <input id="depth" type="range" min="0" max="10" value="4">
              </div>
              <div class="control">
                <label for="wear">Age / wear</label>
                <output id="wearOut">18%</output>
                <input id="wear" type="range" min="0" max="100" value="18">
              </div>
              <div class="control">
                <label for="saturation">Ink saturation</label>
                <output id="saturationOut">115%</output>
                <input id="saturation" type="range" min="30" max="190" value="115">
              </div>
            </div>
          </fieldset>
          <div class="tool-row">
            <div class="bottom-row">
              <button type="button" class="win-btn" id="openImage">Open image…</button>
              <button type="button" class="win-btn" id="randomize">Randomize wear</button>
              <button type="button" class="win-btn" id="download">Save PNG</button>
              <span class="status" id="status" aria-live="polite">100 × 100 squares · ready</span>
            </div>
          </div>
        </div>
        <section class="preview-window" aria-label="Generated blotter preview">
          <div class="preview-title">blotter-art.gif</div>
          <div class="canvas-wrap">
            <canvas id="blotterCanvas" width="1200" height="1200" role="img" aria-label="Blotter art preview. Add an image to generate your sheet."></canvas>
          </div>
        </section>
      </div>
    </section>
  </div>

  <script>
    (() => {
      const root = document.getElementById('blotter-generator');
      const $ = (selector) => root.querySelector(selector);
      const canvas = $('#blotterCanvas');
      const ctx = canvas.getContext('2d', { alpha: false });
      const source = document.createElement('canvas');
      const sctx = source.getContext('2d');
      const imageInput = $('#imageInput');
      const openImage = $('#openImage');
      let img = null;
      let seed = 48271;
      const controls = ['thickness', 'depth', 'wear', 'saturation'];

      const mulberry = () => {
        let t = seed += 0x6D2B79F5;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };

      const val = (id) => Number($('#' + id).value);

      function sync() {
        controls.forEach((id) => {
          const suffix = id === 'wear' || id === 'saturation'
            ? '%'
            : id === 'thickness' || id === 'depth'
              ? ' px'
              : '';
          const display = id === 'thickness' ? val(id).toFixed(1) : val(id);
          $('#' + id + 'Out').value = display + suffix;
        });
        draw();
      }

      function paper() {
        return '#ffffff';
      }

      function drawPlaceholder() {
        ctx.fillStyle = paper();
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'rgba(0,0,0,.45)';
        ctx.font = '28px Tahoma';
        ctx.textAlign = 'center';
        ctx.fillText('DROP IMAGE TO BEGIN', canvas.width / 2, canvas.height / 2);
      }

      function draw() {
        if (!img) {
          drawPlaceholder();
          return;
        }

        const grid = 100;
        const size = canvas.width;
        const cell = size / grid;
        const wear = val('wear') / 100;
        const perf = 0.36;
        const line = val('thickness');
        const depth = val('depth');
        const sat = val('saturation');

        source.width = grid;
        source.height = grid;

        const scale = Math.max(grid / img.width, grid / img.height);
        const width = img.width * scale;
        const height = img.height * scale;

        sctx.clearRect(0, 0, grid, grid);
        sctx.filter = 'saturate(' + sat + '%) contrast(112%)';
        sctx.drawImage(img, (grid - width) / 2, (grid - height) / 2, width, height);
        sctx.filter = 'none';

        ctx.fillStyle = paper();
        ctx.fillRect(0, 0, size, size);
        ctx.imageSmoothingEnabled = false;
        ctx.globalAlpha = 0.93;
        ctx.drawImage(source, 0, 0, grid, grid, 0, 0, size, size);
        ctx.globalAlpha = 1;

        seed = 48271 + grid * 97 + Math.round(wear * 1000);
        for (let i = 0; i < Math.round(grid * grid * wear * 0.48); i += 1) {
          const x = mulberry() * size;
          const y = mulberry() * size;
          const radius = (0.4 + mulberry() * 2.8) * cell / 30;
          ctx.fillStyle = mulberry() > 0.48 ? 'rgba(245,235,200,.38)' : 'rgba(31,21,12,.20)';
          ctx.beginPath();
          ctx.arc(x, y, Math.max(0.8, radius), 0, Math.PI * 2);
          ctx.fill();
        }

        const dot = Math.max(0.35, line * 1.2);
        const every = Math.max(2, Math.round(7 - perf * 5));
        const darkPaper = 'rgba(40,29,20,.78)';
        const rimPaper = 'rgba(255,249,220,.68)';

        function punch(x, y) {
          const wobbleX = (mulberry() - 0.5) * Math.min(dot, depth * 0.16);
          const wobbleY = (mulberry() - 0.5) * Math.min(dot, depth * 0.16);
          const radius = dot * (0.86 + mulberry() * 0.22);
          const inset = depth * 0.34;

          if (depth) {
            ctx.fillStyle = rimPaper;
            ctx.beginPath();
            ctx.arc(
              x - inset * 0.42,
              y - inset * 0.42,
              radius + Math.max(0.35, depth * 0.09),
              0,
              Math.PI * 2,
            );
            ctx.fill();
            ctx.shadowColor = 'rgba(0,0,0,.60)';
            ctx.shadowBlur = Math.max(1, depth * 1.4);
            ctx.shadowOffsetX = inset;
            ctx.shadowOffsetY = inset;
          }

          ctx.fillStyle = darkPaper;
          ctx.beginPath();
          ctx.arc(x + wobbleX, y + wobbleY, radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowColor = 'transparent';
          ctx.shadowBlur = 0;
          ctx.shadowOffsetX = 0;
          ctx.shadowOffsetY = 0;

          if (depth > 2) {
            ctx.fillStyle = 'rgba(0,0,0,.26)';
            ctx.beginPath();
            ctx.arc(
              x + wobbleX + radius * 0.22,
              y + wobbleY + radius * 0.22,
              radius * 0.56,
              0,
              Math.PI * 2,
            );
            ctx.fill();
          }
        }

        for (let i = 1; i < grid; i += 1) {
          if (i % every) continue;
          const position = i * cell;
          for (let distance = cell * 0.5; distance < size; distance += cell * 0.72) {
            punch(position, distance);
            punch(distance, position);
          }
        }

        ctx.strokeStyle = 'rgba(33,25,18,.32)';
        ctx.lineWidth = Math.max(0.45, line * 0.35);
        ctx.strokeRect(line, line, size - line * 2, size - line * 2);
        $('#status').textContent = grid + ' × ' + grid + ' squares · depth ' + depth;
        canvas.setAttribute('aria-label', 'Generated ' + grid + ' by ' + grid + ' blotter art sheet.');
      }

      function load(file) {
        if (!file || !file.type.startsWith('image/')) return;
        const url = URL.createObjectURL(file);
        const next = new Image();
        next.onload = () => {
          img = next;
          URL.revokeObjectURL(url);
          draw();
        };
        next.src = url;
      }

      imageInput.addEventListener('change', (event) => load(event.target.files[0]));
      openImage.addEventListener('click', () => imageInput.click());
      controls.forEach((id) => $('#' + id).addEventListener('input', sync));
      $('#randomize').addEventListener('click', () => {
        seed = Math.floor(Math.random() * 999999);
        $('#wear').value = Math.floor(8 + Math.random() * 65);
        sync();
      });
      $('#download').addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = 'blotter-art.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      });

      drawPlaceholder();
    })();
  </script>
</body>
</html>
