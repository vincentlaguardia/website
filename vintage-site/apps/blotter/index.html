<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="no-referrer">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'unsafe-inline'; img-src blob: data:; font-src 'self' data:; connect-src blob:; media-src 'none'; worker-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'">
<title>Blotter</title>
<style>
  :root {
    --acc-dark: #0a246a;
    --acc-light: #a6caf0;
    --win-face: #c0c0c0;
    --win-light: #ffffff;
    --win-mid: #dfdfdf;
    --win-dark: #808080;
    --win-black: #0a0a0a;
    --paper: #ffffff;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100%;
    background: var(--win-face);
    color: #000;
    font-family: Tahoma, "MS Sans Serif", Geneva, sans-serif;
    font-size: 12px;
  }

  body {
    padding: 0;
  }

  button,
  input,
  select,
  output {
    font: inherit;
  }

  .blotter-app {
    min-height: 100vh;
    background: var(--win-face);
  }

  .window-shell {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    background: var(--win-face);
    box-shadow:
      inset -1px -1px 0 var(--win-black),
      inset 1px 1px 0 var(--win-light),
      inset -2px -2px 0 var(--win-dark),
      inset 2px 2px 0 var(--win-mid);
  }

  .titlebar {
    min-height: 20px;
    padding: 0 3px 0 4px;
    display: flex;
    align-items: center;
    gap: 6px;
    color: #fff;
    font-weight: bold;
    background: linear-gradient(90deg, var(--acc-dark), var(--acc-light) 92%);
  }

  .titlebar-text {
    flex: 1;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }

  .window-buttons {
    display: flex;
    gap: 2px;
  }

  .window-button {
    width: 16px;
    height: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #000;
    background: var(--win-face);
    font-size: 11px;
    line-height: 1;
    box-shadow:
      inset -1px -1px 0 var(--win-black),
      inset 1px 1px 0 var(--win-light),
      inset -1px -1px 0 var(--win-dark),
      inset 1px 1px 0 var(--win-mid);
  }

  .menubar {
    display: flex;
    gap: 12px;
    padding: 2px 6px;
    border-bottom: 1px solid var(--win-dark);
    background: var(--win-face);
    font-size: 11px;
  }

  .menu-item:first-letter,
  legend::first-letter {
    text-decoration: underline;
  }

  .window-body {
    flex: 1;
    display: grid;
    gap: 10px;
    padding: 10px;
    min-height: 0;
  }

  .tool-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: flex-end;
  }

  fieldset {
    margin: 0;
    padding: 10px 10px 12px;
    border: none;
    background: var(--win-face);
    box-shadow:
      inset 1px 1px 0 var(--win-dark),
      inset -1px -1px 0 var(--win-light);
  }

  legend {
    padding: 0 4px;
  }

  .controls {
    display: grid;
    grid-template-columns: repeat(2, minmax(180px, 1fr));
    gap: 10px 14px;
  }

  .control {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 4px 8px;
    align-items: center;
  }

  .control input,
  .control select {
    grid-column: 1 / -1;
    width: 100%;
  }

  .control output,
  .status {
    padding: 2px 4px;
    background: var(--paper);
    box-shadow:
      inset 1px 1px 0 var(--win-dark),
      inset -1px -1px 0 var(--win-light);
  }

  .control output {
    min-width: 48px;
    text-align: right;
  }

  .bottom-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }

  .win-btn {
    padding: 4px 12px;
    border: none;
    cursor: pointer;
    color: #000;
    background: var(--win-face);
    box-shadow:
      inset -1px -1px 0 var(--win-black),
      inset 1px 1px 0 var(--win-light),
      inset -2px -2px 0 var(--win-dark),
      inset 2px 2px 0 var(--win-mid);
  }

  .win-btn:active {
    box-shadow:
      inset 1px 1px 0 var(--win-black),
      inset -1px -1px 0 var(--win-light),
      inset 2px 2px 0 var(--win-dark),
      inset -2px -2px 0 var(--win-mid);
  }

  .status {
    margin-left: auto;
    min-width: 180px;
  }

  .preview-window {
    display: grid;
    gap: 0;
  }

  .preview-title {
    padding: 2px 6px;
    color: #fff;
    font-weight: bold;
    background: linear-gradient(90deg, var(--acc-dark), var(--acc-light) 92%);
  }

  .canvas-wrap {
    padding: 7px;
    background: var(--win-face);
    box-shadow:
      inset 1px 1px 0 var(--win-dark),
      inset -1px -1px 0 var(--win-light);
  }

  #blotterCanvas {
    display: block;
    width: 100%;
    aspect-ratio: 1;
    background: var(--paper);
    image-rendering: pixelated;
  }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  @media (min-width: 900px) {
    .window-body {
      grid-template-columns: minmax(0, 1.1fr) minmax(300px, 0.9fr);
      align-items: start;
    }

    .preview-window {
      height: 100%;
      align-content: start;
    }
  }

  @media (max-width: 699px) {
    .controls {
      grid-template-columns: 1fr;
    }

    .status {
      width: 100%;
      margin-left: 0;
    }
  }

  @media (pointer: coarse) {
    .titlebar {
      min-height: 24px;
    }

    .window-button {
      width: 24px;
      height: 24px;
    }
  }
</style>
</head>
<body>
  <div id="blotter-generator" class="blotter-app">
    <section class="window-shell" aria-label="Blotter art generator">
      <div class="titlebar">
        <span class="titlebar-text">Blotter</span>
        <span class="window-buttons" aria-hidden="true">
          <span class="window-button">_</span>
          <span class="window-button">□</span>
          <span class="window-button">×</span>
        </span>
      </div>
      <div class="menubar" aria-label="Application menu">
        <span class="menu-item">File</span>
        <span class="menu-item">View</span>
      </div>
      <div class="window-body">
        <input id="imageInput" class="sr-only" type="file" accept="image/*">
        <fieldset>
          <legend>Blotter settings</legend>
          <div class="controls" aria-label="Blotter style controls">
            <div class="control">
              <label for="thickness">Perforation thickness</label>
              <output id="thicknessOut">0.6 px</output>
              <input id="thickness" type="range" min="0.1" max="1" step="0.1" value="0.6">
            </div>
            <div class="control">
              <label for="depth">Punch depth</label>
              <output id="depthOut">4 px</output>
              <input id="depth" type="range" min="0" max="10" value="4">
            </div>
            <div class="control">
              <label for="wear">Age / wear</label>
              <output id="wearOut">18%</output>
              <input id="wear" type="range" min="0" max="100" value="18">
            </div>
            <div class="control">
              <label for="saturation">Ink saturation</label>
              <output id="saturationOut">115%</output>
              <input id="saturation" type="range" min="30" max="190" value="115">
            </div>
          </div>
        </fieldset>
        <div class="bottom-row">
          <button type="button" class="win-btn" id="openImage">Open image…</button>
          <button type="button" class="win-btn" id="randomize">Randomize wear</button>
          <button type="button" class="win-btn" id="download">Save PNG</button>
          <span class="status" id="status" aria-live="polite">100 × 100 squares · ready</span>
        </div>
        <section class="preview-window" aria-label="Generated blotter preview">
          <div class="preview-title">blotter-art.gif</div>
          <div class="canvas-wrap">
            <canvas id="blotterCanvas" width="1200" height="1200" role="img" aria-label="Blotter art preview. Add an image to generate your sheet."></canvas>
          </div>
        </section>
      </div>
    </section>
  </div>

  <script src="./app.js"></script>
</body>
</html>
