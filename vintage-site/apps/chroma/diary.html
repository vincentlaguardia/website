<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Diary — chroma.exe</title>
<style>
  :root{
    --face:#c0c0c0;
    --shadow:#808080;
    --dark:#000000;
    --hi:#dfdfdf;
    --white:#ffffff;
    --navy:#000080;
    --teal:#008080;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--teal);
    font-family:Tahoma,'MS Sans Serif','Segoe UI',Arial,sans-serif;
    font-size:12px;
    color:#000;
    -webkit-font-smoothing:none;
  }
  .raised{
    background:var(--face);
    box-shadow: inset -1px -1px 0 var(--dark), inset 1px 1px 0 var(--white),
                inset -2px -2px 0 var(--shadow), inset 2px 2px 0 var(--hi);
  }
  #desktop{
    min-height:100vh;
    padding:0;
    display:flex;
    align-items:stretch;
    justify-content:stretch;
  }
  .window{
    position:relative;
    display:flex;
    flex-direction:column;
    flex:1;
    min-width:0;
    min-height:0;
    background:var(--face);
    box-shadow: inset -1px -1px 0 var(--dark), inset 1px 1px 0 var(--white),
                inset -2px -2px 0 var(--shadow), inset 2px 2px 0 var(--hi);
    padding:3px;
  }
  .titlebar{
    background:var(--navy);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:3px 4px 3px 6px;
    font-weight:bold;
    font-size:13px;
    letter-spacing:.2px;
    flex:0 0 auto;
    cursor:default;
  }
  .titlebar-left{ display:flex; align-items:center; gap:6px; overflow:hidden; }
  .titlebar-left span:last-child{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .titlebar-icon{
    width:14px; height:14px; flex:0 0 auto;
    background:linear-gradient(135deg,#ff4d4d,#ffd24d,#4dd2ff,#9b59ff);
    border:1px solid #000;
  }
  .titlebar-btns{ display:flex; gap:2px; flex:0 0 auto; }
  .tbtn{
    width:16px; height:14px;
    font-size:10px; line-height:12px;
    text-align:center;
    background:var(--face);
    color:#000;
    font-weight:bold;
    cursor:pointer;
    box-shadow: inset -1px -1px 0 var(--dark), inset 1px 1px 0 var(--white),
                inset -1px -1px 0 var(--shadow), inset 1px 1px 0 var(--hi);
    user-select:none;
  }
  .tbtn:active{ box-shadow: inset 1px 1px 0 var(--dark), inset -1px -1px 0 var(--white); }
  .winbody{
    padding:6px;
    flex:1;
    display:flex;
    flex-direction:column;
    min-height:0;
    overflow:hidden;
  }
  .diary-grid{
    display:grid;
    grid-template-columns: repeat(6, 1fr);
    gap:4px;
    padding:4px;
    flex:1;
    overflow-y:auto;
    align-content:start;
  }
  .diary-swatch{
    position:relative;
    aspect-ratio:1;
    cursor:default;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    border:1px solid rgba(0,0,0,0.25);
    padding:3px;
    user-select:none;
  }
  .diary-swatch.empty{
    background:var(--face) !important;
    border:1px dashed var(--shadow) !important;
    opacity:0.35;
  }
  .dsw-hex{
    font-size:9px;
    font-weight:bold;
    text-align:center;
    line-height:1.3;
    word-break:break-all;
  }
  .dsw-rgb{
    font-size:8px;
    text-align:center;
    line-height:1.3;
    word-break:break-all;
  }
  .footer{
    display:flex;
    align-items:center;
    gap:8px;
    padding:4px 4px 2px;
    flex:0 0 auto;
  }
  button.win-btn{
    font-family:inherit;
    font-size:12px;
    padding:5px 12px;
    background:var(--face);
    border:none;
    cursor:pointer;
    box-shadow: inset -1px -1px 0 var(--dark), inset 1px 1px 0 var(--white),
                inset -2px -2px 0 var(--shadow), inset 2px 2px 0 var(--hi);
  }
  button.win-btn:active{
    box-shadow: inset 1px 1px 0 var(--dark), inset -1px -1px 0 var(--white),
                inset 2px 2px 0 var(--shadow), inset -2px -2px 0 var(--hi);
  }
  /* context menu */
  #diary-ctx-menu{
    position:fixed;
    z-index:250;
    min-width:140px;
    padding:2px;
    display:none;
    background:var(--face);
    box-shadow: inset -1px -1px 0 var(--dark), inset 1px 1px 0 var(--white),
                inset -2px -2px 0 var(--shadow), inset 2px 2px 0 var(--hi);
  }
  .menu-option{ padding:4px 10px; cursor:pointer; white-space:nowrap; }
  .menu-option:hover{ background:var(--navy); color:#fff; }
  .menu-sep{ height:1px; background:var(--shadow); box-shadow:0 1px 0 var(--white); margin:3px 2px; }
</style>
</head>
<body>
<div id="desktop">
  <div class="window">
    <div class="titlebar">
      <div class="titlebar-left">
        <span class="titlebar-icon"></span>
        <span>Color Diary — chroma.exe</span>
      </div>
      <div class="titlebar-btns">
        <div class="tbtn" id="btn-close" title="Close">X</div>
      </div>
    </div>
    <div class="winbody">
      <div id="diary-grid" class="diary-grid"></div>
      <div class="footer">
        <span id="diary-count" style="font-size:11px;">0 / 36</span>
        <button class="win-btn" id="diary-clear" style="margin-left:auto;">Clear All</button>
        <button class="win-btn" id="diary-export">Export JPG</button>
      </div>
    </div>
  </div>
</div>
<div id="diary-ctx-menu">
  <div class="menu-option" id="dctx-copy-hex">Copy Hex</div>
  <div class="menu-sep"></div>
  <div class="menu-option" id="dctx-delete">Delete</div>
</div>
<script>
(function(){
  const DIARY_KEY = 'chroma.diary';
  const MAX_DIARY = 36;

  function loadDiary(){
    try{ return JSON.parse(localStorage.getItem(DIARY_KEY)) || []; }
    catch(err){ console.warn('chroma diary: failed to load', err); return []; }
  }
  function saveDiary(colors){ localStorage.setItem(DIARY_KEY, JSON.stringify(colors)); }

  function swatchTextColor(r,g,b){
    return (0.299*r + 0.587*g + 0.114*b)/255 > 0.55 ? '#000' : '#fff';
  }

  function renderDiary(){
    const colors = loadDiary();
    const grid = document.getElementById('diary-grid');
    const countEl = document.getElementById('diary-count');
    grid.innerHTML = '';
    countEl.textContent = colors.length + ' / ' + MAX_DIARY;
    colors.forEach((c,idx)=>{
      const tc = swatchTextColor(c.r, c.g, c.b);
      const div = document.createElement('div');
      div.className = 'diary-swatch';
      div.style.background = c.hex;
      div.title = c.hex + ' \u2014 right-click to delete';
      const hexSpan = document.createElement('span');
      hexSpan.className = 'dsw-hex'; hexSpan.style.color = tc; hexSpan.textContent = c.hex;
      const rgbSpan = document.createElement('span');
      rgbSpan.className = 'dsw-rgb'; rgbSpan.style.color = tc; rgbSpan.textContent = c.r+','+c.g+','+c.b;
      div.appendChild(hexSpan); div.appendChild(rgbSpan);
      div.addEventListener('contextmenu', e=>{ e.preventDefault(); e.stopPropagation(); showCtxMenu(e, idx); });
      grid.appendChild(div);
    });
    for(let i=colors.length; i<MAX_DIARY; i++){
      const div = document.createElement('div');
      div.className = 'diary-swatch empty';
      grid.appendChild(div);
    }
  }

  function deleteColor(idx){
    const colors = loadDiary();
    colors.splice(idx, 1);
    saveDiary(colors);
    renderDiary();
  }

  function clearAll(){
    const colors = loadDiary();
    if(!colors.length || !confirm('Clear all diary colors?')) return;
    saveDiary([]);
    renderDiary();
  }

  function copyText(text){
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).catch(()=> fallbackCopy(text));
    } else { fallbackCopy(text); }
  }
  function fallbackCopy(text){
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); }catch(e){}
    document.body.removeChild(ta);
  }

  function timestampTag(){
    const now = new Date();
    const yyyy = now.getFullYear();
    const mm = String(now.getMonth()+1).padStart(2,'0');
    const dd = String(now.getDate()).padStart(2,'0');
    const hh = String(now.getHours()).padStart(2,'0');
    const mi = String(now.getMinutes()).padStart(2,'0');
    const ss = String(now.getSeconds()).padStart(2,'0');
    return `${yyyy}${mm}${dd}-${hh}${mi}${ss}`;
  }

  function exportDiaryJPG(){
    const colors = loadDiary();
    if(!colors.length){ alert('Diary is empty.'); return; }
    const COLS = 6;
    const ROWS = Math.ceil(colors.length / COLS);
    const SW = 110, SH = 110, GAP = 6, PAD = 16, HEADER = 36;
    const cw = COLS * SW + (COLS - 1) * GAP + PAD * 2;
    const ch = ROWS * SH + (ROWS - 1) * GAP + PAD * 2 + HEADER;
    const c = document.createElement('canvas');
    c.width = cw; c.height = ch;
    const cx = c.getContext('2d');
    cx.fillStyle = '#c0c0c0';
    cx.fillRect(0, 0, cw, ch);
    cx.fillStyle = '#000000';
    cx.font = 'bold 13px Tahoma,Arial,sans-serif';
    cx.textAlign = 'left';
    cx.fillText('chroma.exe \u2014 Color Diary', PAD, PAD + 14);
    colors.forEach((color, i)=>{
      const col = i % COLS;
      const row = Math.floor(i / COLS);
      const x = PAD + col * (SW + GAP);
      const y = PAD + HEADER + row * (SH + GAP);
      cx.fillStyle = color.hex;
      cx.fillRect(x, y, SW, SH);
      cx.strokeStyle = 'rgba(0,0,0,0.22)';
      cx.lineWidth = 1;
      cx.strokeRect(x + 0.5, y + 0.5, SW - 1, SH - 1);
      const tc = swatchTextColor(color.r, color.g, color.b);
      cx.fillStyle = tc;
      cx.font = 'bold 10px Tahoma,Arial,sans-serif';
      cx.textAlign = 'center';
      cx.fillText(color.hex, x + SW / 2, y + SH / 2 - 6);
      cx.font = '9px Tahoma,Arial,sans-serif';
      cx.fillText(color.r + ',' + color.g + ',' + color.b, x + SW / 2, y + SH / 2 + 8);
    });
    const link = document.createElement('a');
    link.download = 'chroma-diary-' + timestampTag() + '.jpg';
    link.href = c.toDataURL('image/jpeg', 0.92);
    link.click();
  }

  // Close button
  document.getElementById('btn-close').addEventListener('click', ()=> window.close());

  // Clear All
  document.getElementById('diary-clear').addEventListener('click', clearAll);

  // Export JPG
  document.getElementById('diary-export').addEventListener('click', exportDiaryJPG);

  // Context menu
  const ctxMenu = document.getElementById('diary-ctx-menu');
  let ctxIdx = -1;
  let ctxColor = null;

  function showCtxMenu(e, idx){
    ctxIdx = idx;
    ctxColor = loadDiary()[idx] || null;
    ctxMenu.style.left = e.clientX + 'px';
    ctxMenu.style.top = e.clientY + 'px';
    ctxMenu.style.display = 'block';
  }
  function hideCtxMenu(){ ctxMenu.style.display = 'none'; ctxIdx = -1; ctxColor = null; }

  document.getElementById('dctx-copy-hex').addEventListener('click', e=>{
    e.stopPropagation();
    if(ctxColor) copyText(ctxColor.hex);
    hideCtxMenu();
  });
  document.getElementById('dctx-delete').addEventListener('click', e=>{
    e.stopPropagation();
    if(ctxIdx >= 0) deleteColor(ctxIdx);
    hideCtxMenu();
  });
  document.addEventListener('click', e=>{
    if(!ctxMenu.contains(e.target)) hideCtxMenu();
  });

  // Refresh when chroma writes to localStorage
  window.addEventListener('storage', e=>{
    if(e.key === DIARY_KEY) renderDiary();
  });

  // Initial render
  renderDiary();
})();
</script>
</body>
</html>
