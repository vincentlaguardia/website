<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>chroma.exe</title>
<style>
  :root{
    --face:#c0c0c0;
    --shadow:#808080;
    --dark:#000000;
    --hi:#dfdfdf;
    --white:#ffffff;
    --navy:#000080;
    --teal:#008080;
    --swatch-size:20px;
    --diary-grid-columns:6;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--teal);
    font-family:Tahoma,'MS Sans Serif','Segoe UI',Arial,sans-serif;
    font-size:12px;
    color:#000;
    -webkit-font-smoothing:none;
  }
  html.ui-inverted body,
  body.ui-inverted{
    filter: invert(1) hue-rotate(180deg);
  }
  .raised{
    background:var(--face);
    box-shadow: inset -1px -1px 0 var(--dark), inset 1px 1px 0 var(--white),
                inset -2px -2px 0 var(--shadow), inset 2px 2px 0 var(--hi);
  }
  .sunken{
    background:var(--face);
    box-shadow: inset 1px 1px 0 var(--dark), inset -1px -1px 0 var(--white),
                inset 2px 2px 0 var(--shadow), inset -2px -2px 0 var(--hi);
  }
  #desktop{
    min-height:100vh;
    padding:36px 16px 56px;
    display:flex;
    align-items:flex-start;
    justify-content:center;
  }
  .window{
    position:relative;
    display:flex;
    flex-direction:column;
    width:900px;
    height:900px;
    max-width:96vw;
    min-width:320px;
    min-height:480px;
    background:var(--face);
    box-shadow: inset -1px -1px 0 var(--dark), inset 1px 1px 0 var(--white),
                inset -2px -2px 0 var(--shadow), inset 2px 2px 0 var(--hi);
    padding:3px;
  }
  .titlebar{
    background:var(--navy);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:3px 4px 3px 6px;
    font-weight:bold;
    font-size:13px;
    letter-spacing:.2px;
    flex:0 0 auto;
  }
  .titlebar-left{ display:flex; align-items:center; gap:6px; overflow:hidden; }
  .titlebar-left span:last-child{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .titlebar-icon,
  .task-icon{
    width:14px; height:14px; flex:0 0 auto;
    background:linear-gradient(135deg,#ff4d4d,#ffd24d,#4dd2ff,#9b59ff);
    border:1px solid #000;
  }
  .task-icon{
    display:inline-block;
    vertical-align:-2px;
    margin-right:4px;
  }
  .titlebar-btns{ display:flex; gap:2px; flex:0 0 auto; }
  .tbtn{
    width:16px; height:14px;
    font-size:10px; line-height:12px;
    text-align:center;
    background:var(--face);
    color:#000;
    font-weight:bold;
    cursor:pointer;
    box-shadow: inset -1px -1px 0 var(--dark), inset 1px 1px 0 var(--white),
                inset -1px -1px 0 var(--shadow), inset 1px 1px 0 var(--hi);
    user-select:none;
  }
  .tbtn:active{ box-shadow: inset 1px 1px 0 var(--dark), inset -1px -1px 0 var(--white); }
  .menubar{
    display:flex;
    align-items:center;
    gap:2px;
    padding:2px 4px;
    position:relative;
    background:var(--face);
    border-bottom:1px solid var(--shadow);
    flex:0 0 auto;
  }
  .menu-item{ padding:3px 8px; cursor:pointer; user-select:none; }
  .menu-item:hover, .menu-item.open{ background:var(--navy); color:#fff; }
  .menu-dropdown{
    display:none;
    position:absolute;
    top:22px;
    min-width:190px;
    z-index:20;
    padding:2px;
  }
  .menu-dropdown.show{ display:block; }
  .menu-option{ padding:4px 10px; cursor:pointer; white-space:nowrap; }
  .menu-option:hover{ background:var(--navy); color:#fff; }
  .menu-sep{ height:1px; background:var(--shadow); box-shadow:0 1px 0 var(--white); margin:3px 2px; }
  .ctrlbar{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:16px;
    padding:6px 10px;
    flex:0 0 auto;
    border-bottom:1px solid var(--shadow);
  }
  .field{ display:flex; flex-direction:column; gap:3px; font-size:11px; }
  .ctrl-btn{
    font-family:inherit;
    font-size:11px;
    padding:6px 16px;
    background:var(--face);
    border:none;
    cursor:pointer;
    white-space:nowrap;
    box-shadow: inset -1px -1px 0 var(--dark), inset 1px 1px 0 var(--white),
                inset -2px -2px 0 var(--shadow), inset 2px 2px 0 var(--hi);
  }
  .ctrl-btn:active, .ctrl-btn.is-active{
    box-shadow: inset 1px 1px 0 var(--dark), inset -1px -1px 0 var(--white),
                inset 2px 2px 0 var(--shadow), inset -2px -2px 0 var(--hi);
  }
  .cc-style-wrap{ position:relative; }
  .style-dropdown{
    display:none;
    position:absolute;
    top:100%;
    left:0;
    margin-top:2px;
    min-width:170px;
    z-index:25;
    padding:2px;
  }
  .style-dropdown.show{ display:block; }
  .style-dropdown .menu-option.active{ background:var(--navy); color:#fff; }
  input[type=color]{
    width:38px; height:24px; padding:0; cursor:pointer;
    border:2px solid var(--shadow);
    border-radius:0;
    background:var(--face);
  }
  input[type=color]::-webkit-color-swatch-wrapper{ padding:0; background:var(--face); }
  input[type=color]::-webkit-color-swatch{ border:none; border-radius:0; background:var(--face); }
  input[type=color]::-moz-color-swatch{ border:none; border-radius:0; background:var(--face); }
  .picker-with-hex{
    display:flex;
    align-items:center;
    gap:4px;
  }
  input[type=range]{
    -webkit-appearance:none;
    width:110px;
    height:4px;
    background:var(--shadow);
    box-shadow: inset 1px 1px 0 var(--dark), inset -1px -1px 0 var(--hi);
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:14px; height:20px;
    background:var(--face);
    box-shadow: inset -1px -1px 0 var(--dark), inset 1px 1px 0 var(--white),
                inset -2px -2px 0 var(--shadow), inset 2px 2px 0 var(--hi);
    cursor:pointer;
  }
  input[type=range]::-moz-range-thumb{
    width:14px; height:20px; border:none;
    background:var(--face);
    box-shadow: inset -1px -1px 0 var(--dark), inset 1px 1px 0 var(--white),
                inset -2px -2px 0 var(--shadow), inset 2px 2px 0 var(--hi);
    cursor:pointer;
  }
  .cc-lastcolor{ display:flex; align-items:center; gap:6px; }
  .cc-lastswatch{
    width:var(--swatch-size); height:var(--swatch-size);
    border:2px solid var(--shadow);
    background:var(--face);
    box-sizing:border-box;
    flex:0 0 auto;
  }
  .cc-copybox{
    padding:5px 8px;
    font-size:11px;
    cursor:pointer;
    background:var(--face);
    white-space:nowrap;
    box-shadow: inset -1px -1px 0 var(--dark), inset 1px 1px 0 var(--white),
                inset -2px -2px 0 var(--shadow), inset 2px 2px 0 var(--hi);
  }
  .cc-copybox:active{
    box-shadow: inset 1px 1px 0 var(--dark), inset -1px -1px 0 var(--white),
                inset 2px 2px 0 var(--shadow), inset -2px -2px 0 var(--hi);
  }
  .winbody{
    padding:8px;
    flex:1;
    display:flex;
    flex-direction:column;
    min-height:0;
  }
  .content-panel{
    padding:6px;
    flex:1;
    min-height:0;
    display:flex;
    flex-direction:column;
  }
  .content-panel.drop-active{
    background:#dcecff;
    outline:2px dashed var(--navy);
    outline-offset:-4px;
  }
  .cc-wrap{
    position:relative;
    flex:1;
    min-height:120px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .cc-frame{ display:inline-block; border:1px solid #000; line-height:0; }
  #cc-canvas{ display:block; box-sizing:content-box; border:none; cursor:crosshair; }
  button.win-btn{
    font-family:inherit;
    font-size:12px;
    padding:6px 14px;
    background:var(--face);
    border:none;
    cursor:pointer;
    box-shadow: inset -1px -1px 0 var(--dark), inset 1px 1px 0 var(--white),
                inset -2px -2px 0 var(--shadow), inset 2px 2px 0 var(--hi);
  }
  button.win-btn:active{
    box-shadow: inset 1px 1px 0 var(--dark), inset -1px -1px 0 var(--white),
                inset 2px 2px 0 var(--shadow), inset -2px -2px 0 var(--hi);
  }
  p.lead{ line-height:1.5; margin:6px 0 12px; max-width:64ch; }
  .resize-handle{
    position:absolute;
    right:1px; bottom:1px;
    width:14px; height:14px;
    cursor:nwse-resize;
    background:
      linear-gradient(135deg, transparent 0 35%, var(--shadow) 35% 42%, transparent 42% 58%,
      var(--shadow) 58% 65%, transparent 65% 82%, var(--shadow) 82% 89%, transparent 89% 100%);
    z-index:30;
  }
  #taskbar{
    position:fixed; left:0; right:0; bottom:0; height:32px;
    background:var(--face);
    display:flex; align-items:center;
    gap:6px; padding:2px 4px;
    box-shadow: inset 0 1px 0 var(--white), inset 0 2px 0 var(--hi);
    z-index:50;
  }
  #start-btn{
    display:flex; align-items:center; gap:5px;
    font-weight:bold; font-size:12px;
    padding:4px 10px 4px 6px;
    background:var(--face);
    cursor:pointer;
    box-shadow: inset -1px -1px 0 var(--dark), inset 1px 1px 0 var(--white),
                inset -2px -2px 0 var(--shadow), inset 2px 2px 0 var(--hi);
  }
  #start-btn.active{
    box-shadow: inset 1px 1px 0 var(--dark), inset -1px -1px 0 var(--white),
                inset 2px 2px 0 var(--shadow), inset -2px -2px 0 var(--hi);
  }
  #start-btn .flag{
    width:16px; height:16px;
    background:conic-gradient(#ff0000 0 90deg,#00aa00 90deg 180deg,#0000ff 180deg 270deg,#ffcc00 270deg 360deg);
    border:1px solid #000;
  }
  .task-item{
    flex:0 0 auto;
    display:flex; align-items:center; gap:6px;
    font-size:12px; padding:3px 10px;
    box-shadow: inset 1px 1px 0 var(--dark), inset -1px -1px 0 var(--white),
                inset 2px 2px 0 var(--shadow), inset -2px -2px 0 var(--hi);
  }
  #invert-btn{
    flex:0 0 auto;
    font-size:12px;
    padding:3px 10px;
    background:var(--face);
    border:none;
    cursor:pointer;
    box-shadow: inset -1px -1px 0 var(--dark), inset 1px 1px 0 var(--white),
                inset -2px -2px 0 var(--shadow), inset 2px 2px 0 var(--hi);
  }
  #invert-btn:active,
  #invert-btn.active{
    box-shadow: inset 1px 1px 0 var(--dark), inset -1px -1px 0 var(--white),
                inset 2px 2px 0 var(--shadow), inset -2px -2px 0 var(--hi);
  }
  .tray{
    margin-left:auto;
    font-size:11px;
    padding:4px 10px;
    box-shadow: inset 1px 1px 0 var(--shadow), inset -1px -1px 0 var(--hi),
                inset 2px 2px 0 var(--dark), inset -2px -2px 0 var(--white);
  }
</style>
<script>
  (function(){
    const storageKey = 'chroma.ui.invert';
    let invertEnabled = false;
    try {
      invertEnabled = window.localStorage.getItem(storageKey) === 'true';
    } catch (e) {}
    if(invertEnabled){
      document.documentElement.classList.add('ui-inverted');
    }
    window.__chromaUiInvert = { storageKey, enabled: invertEnabled };
  })();
</script>
</head>
<body>
<script>if (window.self !== window.top) { document.documentElement.classList.add('embedded'); document.body.classList.add('embedded'); }</script>
<div id="desktop"></div>
<div id="taskbar">
  <div id="start-btn"><span class="flag"></span>Start</div>
  <div class="task-item raised"><span class="task-icon"></span>chroma.exe</div>
  <button id="invert-btn" type="button" aria-pressed="false">Invert</button>
  <div class="tray" id="tray-clock">--:-- --</div>
</div>
<script>
(function(){
  const invertBtn = document.getElementById('invert-btn');
  const INVERT_CLASS = 'ui-inverted';
  const invertState = window.__chromaUiInvert || { storageKey: 'chroma.ui.invert', enabled: false };
  function persistInvertState(enabled){
    try {
      window.localStorage.setItem(invertState.storageKey, enabled ? 'true' : 'false');
    } catch (e) {}
  }
  function setInvertState(enabled, persist = true){
    document.documentElement.classList.toggle(INVERT_CLASS, enabled);
    document.body.classList.toggle(INVERT_CLASS, enabled);
    invertState.enabled = enabled;
    if(invertBtn){
      invertBtn.classList.toggle('active', enabled);
      invertBtn.setAttribute('aria-pressed', enabled ? 'true' : 'false');
      invertBtn.textContent = enabled ? 'Invert: On' : 'Invert';
    }
    if(persist){
      persistInvertState(enabled);
    }
  }
  setInvertState(Boolean(invertState.enabled || document.documentElement.classList.contains(INVERT_CLASS)), false);
  if(invertBtn){
    invertBtn.addEventListener('click', ()=>{
      const next = !document.body.classList.contains(INVERT_CLASS);
      setInvertState(next);
    });
  }
})();
</script>
</body>
</html>
