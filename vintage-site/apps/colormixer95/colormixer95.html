<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Mixer</title>
<style>
  :root{
    --face:#c0c0c0;
    --shadow:#808080;
    --darkshadow:#000000;
    --hi:#ffffff;
    --lite:#dfdfdf;
    --titleblue1:#000080;
    --titleblue2:#1084d0;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:#008080;
    font-family: Tahoma, "Segoe UI", Arial, sans-serif;
    font-size:12px;
    color:#000;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:30px 12px;
    user-select:none;
  }
  body.embedded{
    background:var(--face);
    min-height:100%;
    display:block;
    padding:0;
  }

  .raised{
    background:var(--face);
    border-top:1px solid var(--hi); border-left:1px solid var(--hi);
    border-right:1px solid var(--darkshadow); border-bottom:1px solid var(--darkshadow);
    box-shadow: inset 1px 1px 0 var(--lite), inset -1px -1px 0 var(--shadow);
  }
  .sunken{
    background:#fff;
    border-top:1px solid var(--shadow); border-left:1px solid var(--shadow);
    border-right:1px solid var(--hi); border-bottom:1px solid var(--hi);
    box-shadow: inset 1px 1px 0 var(--darkshadow);
  }

  /* ---- window ---- */
  .window{ width:100%; }
  #mainWindow{
    width:750px; height:1000px;
    resize:none; overflow:hidden;
    display:flex; flex-direction:column;
  }
  body.embedded #mainWindow{
    width:100%;
    height:100%;
    min-height:0;
  }
  @media (max-width:460px){ #mainWindow{ width:100%; } }
  .titlebar{
    background:linear-gradient(90deg,var(--titleblue1),var(--titleblue2));
    color:#fff;
    display:flex;align-items:center;justify-content:space-between;
    padding:3px 3px 3px 6px;
    font-weight:bold;
    letter-spacing:.3px;
    font-size:12.5px;
  }
  .titlebar .ttext{display:flex;align-items:center;gap:6px;}
  .titlebar .icon{font-size:13px;}
  .titlebtns{display:flex;gap:2px;}
  .tbtn{
    width:16px;height:14px;
    background:var(--face);
    border-top:1px solid var(--hi); border-left:1px solid var(--hi);
    border-right:1px solid var(--darkshadow); border-bottom:1px solid var(--darkshadow);
    box-shadow: inset 1px 1px 0 var(--lite);
    font-size:10px;line-height:12px;text-align:center;color:#000;font-weight:bold;
    cursor:pointer;
  }
  .tbtn:active{
    border-top:1px solid var(--darkshadow); border-left:1px solid var(--darkshadow);
    border-right:1px solid var(--hi); border-bottom:1px solid var(--hi);
    box-shadow:none;
  }
  .menubar{
    display:flex;gap:14px;
    padding:3px 8px;
    border-bottom:1px solid var(--shadow);
    background:var(--face);
    position:relative;
  }
  .menuitem{position:relative;cursor:default;}
  .menuitem:hover, .menuitem.open{background:var(--titleblue2);color:#fff;padding:0 2px;margin:0 -2px;}
  .dropdown-menu{
    display:none;
    position:absolute;top:100%;left:-2px;
    min-width:150px;
    background:var(--face);
    border-top:1px solid var(--hi); border-left:1px solid var(--hi);
    border-right:1px solid var(--darkshadow); border-bottom:1px solid var(--darkshadow);
    box-shadow:2px 2px 4px rgba(0,0,0,0.4);
    z-index:70;
    padding:2px 0;
  }
  .dropdown-menu.show{display:block;}
  .dropdown-item{
    padding:5px 12px;font-size:11.5px;color:#000;cursor:default;white-space:nowrap;
  }
  .dropdown-item:hover{background:var(--titleblue2);color:#fff;}

  .body95{ background:var(--face); padding:12px; flex:1; overflow:auto; }
  .lede95{ font-size:11.5px;line-height:1.6;margin:0 0 12px; }

  fieldset{
    border-top:1px solid var(--shadow); border-left:1px solid var(--shadow);
    border-right:1px solid var(--hi); border-bottom:1px solid var(--hi);
    margin:0 0 12px;padding:10px 12px 12px;
  }
  .samplewrap{ margin:0 0 12px; }
  legend{padding:0 4px;font-weight:bold;font-size:12px;}

  .samplerow{display:flex;gap:10px;flex-wrap:wrap;align-items:stretch;}
  .samplerow{ --rowh: 26px; }
  .pickwrap{display:flex;}
  .pickbtn{
    display:flex;align-items:center;justify-content:center;
    height:var(--rowh);box-sizing:border-box;
    padding:0 12px;font-size:11.5px;cursor:pointer;
  }
  .dropzone{
    flex:0 1 130px;min-width:100px;height:var(--rowh);box-sizing:border-box;
    display:flex;align-items:center;justify-content:center;
    text-align:center;font-size:9px;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    border:1px dashed var(--shadow);
    padding:0;cursor:pointer;
  }
  #dropZoneHint{ padding:0 6px; }
  .dropzone.hover{ background:#e8f1ff; }
  .muted95{color:var(--shadow);}
  .samplerow .btn95{ height:var(--rowh);box-sizing:border-box;display:flex;align-items:center;justify-content:center; }
  .copyval{
    height:var(--rowh);box-sizing:border-box;
    font-family:inherit;font-size:11px;padding:0 8px;
    cursor:pointer;text-align:center;
    display:flex;align-items:center;justify-content:center;
  }

  .modegrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media (max-width:640px){.modegrid{grid-template-columns:1fr;}}

  .screenbezel{ background:var(--face); padding:6px; margin-bottom:10px; }
  .vennc{ display:block; width:100%; height:auto; }

  .sliderow{display:flex;align-items:center;gap:8px;margin:9px 0 3px;}
  .sliderow label, .colorrow label{width:58px;flex-shrink:0;font-size:11.5px;}
  .sliderow .val95{ width:32px;text-align:center;font-size:11px;padding:1px 0; }

  .colorrow{display:flex;align-items:center;gap:8px;margin:9px 0 3px;}
  .colorswrap{display:flex;gap:14px;align-items:stretch;}
  .colorrowsCol{flex:1;min-width:0;}
  .paletteBtnCol{flex:0 0 150px;display:flex;align-items:stretch;padding-left:14px;border-left:1px solid var(--shadow);}
  .paletteBtnCol .btn95{flex:1;width:100%;font-size:12px;}

  .palettegrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .paletteCell{display:flex;flex-direction:column;gap:4px;}
  .paletteSwatch{height:56px;}
  .paletteCell .copyval{height:22px;font-size:10px;padding:0 4px;}
  .colorrow input[type=color]{ width:32px;height:22px;padding:0;border:none;cursor:pointer; }
  .colorrow .val95{ width:64px;text-align:center;font-size:11px;padding:2px 4px; }

  input[type=range]{ -webkit-appearance:none;appearance:none; width:100%;height:18px;background:transparent;margin:0; }
  input[type=range]::-webkit-slider-runnable-track{
    height:6px;background:var(--track-bg, var(--face));
    border-top:1px solid var(--shadow); border-left:1px solid var(--shadow);
    border-right:1px solid var(--hi); border-bottom:1px solid var(--hi);
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:12px;height:22px;margin-top:-8px;
    background:var(--face);
    border-top:1px solid var(--hi); border-left:1px solid var(--hi);
    border-right:1px solid var(--darkshadow); border-bottom:1px solid var(--darkshadow);
    box-shadow:inset 1px 1px 0 var(--lite);
    cursor:pointer;
  }
  input[type=range]::-moz-range-track{
    height:6px;background:var(--track-bg, var(--face));
    border-top:1px solid var(--shadow); border-left:1px solid var(--shadow);
    border-right:1px solid var(--hi); border-bottom:1px solid var(--hi);
  }
  input[type=range]::-moz-range-thumb{
    width:12px;height:22px;border-radius:0;
    background:var(--face);
    border-top:1px solid var(--hi); border-left:1px solid var(--hi);
    border-right:1px solid var(--darkshadow); border-bottom:1px solid var(--darkshadow);
    cursor:pointer;
  }

  .resultrow{display:flex;align-items:stretch;gap:8px;margin-top:12px;padding-top:10px;border-top:1px solid var(--shadow);}
  .resultswatch{width:26px;height:26px;flex-shrink:0;}
  .resultrow .copyval{ flex:1;height:26px; }

  .statusbar{ display:flex; border-top:1px solid var(--hi); }
  .statuscell{
    flex:1; padding:3px 8px;font-size:11px;
    border-top:1px solid var(--shadow); border-left:1px solid var(--shadow);
    border-right:1px solid var(--hi); border-bottom:1px solid var(--hi);
    margin:3px 2px 3px 3px;
  }
  .statuscell:last-child{flex:0 0 140px;}

  /* ---- modal ---- */
  .overlay{ position:fixed;inset:0;background:rgba(0,0,0,0); display:none;align-items:center;justify-content:center;z-index:100; }
  .overlay.show{display:flex;}
  .dialog{width:290px;}
  .dialog .body95{display:flex;gap:12px;align-items:center;padding:18px 14px;}
  .dialog .body95 .glyph{font-size:30px;}

  .imgdialog{width:auto;max-width:92vw;}
  #imagePickCanvas{
    display:block;max-width:100%;
    border-top:1px solid var(--shadow);border-left:1px solid var(--shadow);
    border-right:1px solid var(--hi);border-bottom:1px solid var(--hi);
    cursor:url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0Ij4KICA8Y2lyY2xlIGN4PSIxMCIgY3k9IjEwIiByPSI3IiBmaWxsPSJyZ2JhKDI1NSwyNTUsMjU1LDAuMTIpIiBzdHJva2U9ImJsYWNrIiBzdHJva2Utd2lkdGg9IjIuNCIvPgogIDxjaXJjbGUgY3g9IjEwIiBjeT0iMTAiIHI9IjciIGZpbGw9Im5vbmUiIHN0cm9rZT0id2hpdGUiIHN0cm9rZS13aWR0aD0iMS4xIi8+CiAgPGxpbmUgeDE9IjE1IiB5MT0iMTUiIHgyPSIyMSIgeTI9IjIxIiBzdHJva2U9ImJsYWNrIiBzdHJva2Utd2lkdGg9IjMuNCIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIi8+CiAgPGxpbmUgeDE9IjE1IiB5MT0iMTUiIHgyPSIyMSIgeTI9IjIxIiBzdHJva2U9IndoaXRlIiBzdHJva2Utd2lkdGg9IjEuNCIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIi8+Cjwvc3ZnPgo=") 10 10, crosshair;
  }
  .imgpickrow{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:nowrap;}
  .imgpickrow .resultswatch{width:26px;height:26px;flex-shrink:0;}
  .imgpickrow .btn95{display:flex;align-items:center;gap:6px;white-space:nowrap;}
  .miniSwatch{width:13px;height:13px;background:var(--face);flex-shrink:0;}
  #dropZonePreview{width:100%;height:100%;display:block;transition:filter .15s;}
  #dropZonePreview.stale{filter:grayscale(1) opacity(0.5);}
  .dialog .body95 p{margin:0;font-size:11.5px;line-height:1.5;}
  .dialog .btnrow, .imgdialog .btnrow{display:flex;justify-content:center;padding:0 14px 14px;}
  .btn95{
    background:var(--face);
    padding:5px 22px;font-family:inherit;font-size:11.5px;
    border-top:1px solid var(--hi); border-left:1px solid var(--hi);
    border-right:1px solid var(--darkshadow); border-bottom:1px solid var(--darkshadow);
    box-shadow: inset 1px 1px 0 var(--lite);
    cursor:pointer;
  }
  .btn95:active{
    border-top:1px solid var(--darkshadow); border-left:1px solid var(--darkshadow);
    border-right:1px solid var(--hi); border-bottom:1px solid var(--hi);
    box-shadow:none;
  }

  /* ---- diary ---- */
  .diary-lastswatch{
    width:26px; height:26px; flex-shrink:0;
    background:var(--face);
    cursor:default;
    align-self:center;
  }
  #diaryOverlay .imgdialog{ width:440px; max-width:92vw; }
  .diary-winbody{
    display:flex; flex-direction:column; padding:6px; flex:1; min-height:0; overflow:hidden;
  }
  .diary-grid{
    display:grid; grid-template-columns:repeat(6,1fr);
    gap:4px; padding:4px; overflow-y:auto; align-content:start;
    max-height:360px; min-height:60px;
  }
  .diary-swatch{
    position:relative; aspect-ratio:1; cursor:default;
    display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
    overflow:hidden; border:1px solid rgba(0,0,0,0.25);
    padding:0 3px 4px; user-select:none;
  }
  .diary-swatch.empty{
    background:var(--face) !important; border:1px dashed var(--shadow) !important; opacity:0.35;
  }
  .dsw-hex{ font-size:9px; font-weight:bold; text-align:center; line-height:1.3; word-break:break-all; }
  .dsw-rgb{ font-size:8px; text-align:center; line-height:1.3; word-break:break-all; }
  .diary-footer{
    display:flex; align-items:center; gap:8px; padding:4px 4px 2px; flex:0 0 auto;
  }
  #cmDiaryCtxMenu,
  #cmAppCtxMenu{
    position:fixed; z-index:250; min-width:140px; padding:2px; display:none;
    background:var(--face);
    border-top:1px solid var(--hi); border-left:1px solid var(--hi);
    border-right:1px solid var(--darkshadow); border-bottom:1px solid var(--darkshadow);
    box-shadow:inset 1px 1px 0 var(--lite), inset -1px -1px 0 var(--shadow);
  }
  .cm-menu-option{ padding:4px 10px; cursor:pointer; white-space:nowrap; }
  .cm-menu-option:hover{ background:var(--titleblue2); color:#fff; }
  .cm-menu-sep{ height:1px; background:var(--shadow); box-shadow:0 1px 0 var(--hi); margin:3px 2px; }
</style>
</head>

        <p style="margin:0 0 8px;font-size:11.5px;">File name:</p>
        <input class="sunken" id="saveAsInput" style="width:100%;font-family:inherit;font-size:11.5px;padding:5px 6px;border:none;" value="color-mixer.json">

  <div class="overlay" id="imagePickOverlay">

      <div class="titlebar">

  <div class="overlay" id="paletteOverlay">

  <div class="overlay" id="diaryOverlay">

<script>
const EMBEDDED = new URLSearchParams(window.location.search).get('embedded') === '1';
if(EMBEDDED) document.body.classList.add('embedded');

/* ---------- blend math ---------- */
function screen(a,b){ return 1-(1-a)*(1-b); }
function multiply(a,b){ return a*b; }
function exclusionBlend(a,b){ return a+b-2*a*b; }
function divideBlend(a,b){ return b<=0 ? a : Math.min(1, a/b); }

/* circles in `subset` (ascending index order) chain-blend together first,
   then the background blends in last, on top of that result. An empty
   subset (no circles at this pixel) is just the background, untouched.
   Applying the background last keeps each mode's neutral background
   (black for screen/exclusion, white for multiply/divide) a true no-op,
   so a sampled color still reproduces exactly at center by default —
   while a background the user actually changes genuinely mixes in. */
function chainBlend(background, layers, subset, blendFn){
  const bgN = [background[0]/255, background[1]/255, background[2]/255];
  if(subset.length===0){
    return background.map(v=>Math.round(Math.min(255,Math.max(0,v))));
  }
  let acc = [layers[subset[0]][0]/255, layers[subset[0]][1]/255, layers[subset[0]][2]/255];
  for(let k=1;k<subset.length;k++){
    const nxt = layers[subset[k]];
    acc = [
      blendFn(acc[0], nxt[0]/255),
      blendFn(acc[1], nxt[1]/255),
      blendFn(acc[2], nxt[2]/255),
    ];
  }
  acc = [blendFn(acc[0],bgN[0]), blendFn(acc[1],bgN[1]), blendFn(acc[2],bgN[2])];
  return [
    Math.round(Math.min(1,Math.max(0,acc[0]))*255),
    Math.round(Math.min(1,Math.max(0,acc[1]))*255),
    Math.round(Math.min(1,Math.max(0,acc[2]))*255),
  ];
}
function rgbCss(c){ return `rgb(${c[0]},${c[1]},${c[2]})`; }
function rgbToHex(c){ return '#' + c.map(v=>v.toString(16).padStart(2,'0')).join(''); }
function hexToRgb(hex){
  const h = hex.replace('#','');
  return [parseInt(h.substring(0,2),16), parseInt(h.substring(2,4),16), parseInt(h.substring(4,6),16)];
}

/* ---------- mode definitions ---------- */
const MODE_ORDER = ['additive','subtractive','division','exclusion'];
const MODES = {
  additive: {
    legend: 'Additive — Light (RGB)',
    base: [0,0,0],
    blend: screen,
    type: 'sliders',
    controls: [
      {key:'R', label:'Red', min:0, max:255},
      {key:'G', label:'Green', min:0, max:255},
      {key:'B', label:'Blue', min:0, max:255},
    ],
    defaults: {R:255,G:255,B:255},
    layerColors(v){ return [[v.R,0,0],[0,v.G,0],[0,0,v.B]]; },
  },
  subtractive: {
    legend: 'Subtractive — Pigment (CMY)',
    base: [255,255,255],
    blend: multiply,
    type: 'sliders',
    controls: [
      {key:'C', label:'Cyan', min:0, max:100},
      {key:'M', label:'Magenta', min:0, max:100},
      {key:'Y', label:'Yellow', min:0, max:100},
    ],
    defaults: {C:100,M:100,Y:100},
    layerColors(v){
      return [
        [255*(1-v.C/100),255,255],
        [255,255*(1-v.M/100),255],
        [255,255,255*(1-v.Y/100)],
      ];
    },
  },
  division: {
    legend: 'Division',
    base: [255,255,255],
    blend: divideBlend,
    type: 'sliders',
    controls: [
      {key:'R', label:'Red',   min:0, max:255},
      {key:'G', label:'Green', min:0, max:255},
      {key:'B', label:'Blue',  min:0, max:255},
    ],
    defaults: {R:128, G:128, B:128},
    layerColors(v){
      const sq = n => Math.round(n*n/255);
      return [
        [v.R, sq(v.G), sq(v.B)],
        [255, v.G, 255],
        [255, 255, v.B],
      ];
    },
  },
  exclusion: {
    legend: 'Exclusion',
    base: [0,0,0],
    blend: exclusionBlend,
    type: 'sliders',
    controls: [
      {key:'R', label:'Red',   min:0, max:255},
      {key:'G', label:'Green', min:0, max:255},
      {key:'B', label:'Blue',  min:0, max:255},
    ],
    defaults: {R:255, G:255, B:255},
    layerColors(v){ return [[v.R,0,0],[0,v.G,0],[0,0,v.B]]; },
  },
};

const state = {};
MODE_ORDER.forEach(key=>{
  state[key] = {...MODES[key].defaults};
  state[key].BG = rgbToHex(MODES[key].base);
});

/* smaller circles, lighter overlap. Rendered at SCALE-x resolution and
   displayed smaller via CSS so the edges anti-alias instead of looking
   blocky/pixelated. */
const SCALE = 4;
const BASE_CIRCLES = [
  {x:90, y:63, r:52},
  {x:105, y:89, r:52},
  {x:75, y:89, r:52},
];
const CANVAS_W = 180*SCALE, CANVAS_H = 150*SCALE;
const CIRCLES = BASE_CIRCLES.map(c=>({x:c.x*SCALE, y:c.y*SCALE, r:c.r*SCALE}));

function drawVenn(canvas, layerColors, background, blendFn){
  const ctx = canvas.getContext('2d');
  const img = ctx.createImageData(CANVAS_W, CANVAS_H);
  const data = img.data;
  for(let y=0;y<CANVAS_H;y++){
    for(let x=0;x<CANVAS_W;x++){
      const subset = [];
      for(let i=0;i<3;i++){
        const c = CIRCLES[i];
        const dx = x-c.x, dy = y-c.y;
        if(dx*dx+dy*dy <= c.r*c.r) subset.push(i);
      }
      const rgb = chainBlend(background, layerColors, subset, blendFn);
      const idx = (y*CANVAS_W+x)*4;
      data[idx]=rgb[0]; data[idx+1]=rgb[1]; data[idx+2]=rgb[2]; data[idx+3]=255;
    }
  }
  ctx.putImageData(img,0,0);
  CIRCLES.forEach(c=>{
    ctx.beginPath();
    ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 1*SCALE;
    ctx.stroke();
  });
}

/* each slider's track fades from "no channel" to "full channel" so the
   track color hints at what the handle is actually selecting.
   Division's track starts at white because white (1) is its neutral/
   identity value (divideBlend(a,1) = a), matching the mode's white base. */
const TRACK_GRADIENTS = {
  additive:    { R:['#000000','#ff0000'], G:['#000000','#00ff00'], B:['#000000','#0000ff'] },
  subtractive: { C:['#ffffff','#00ffff'], M:['#ffffff','#ff00ff'], Y:['#ffffff','#ffff00'] },
  division:    { R:['#ffffff','#ff0000'], G:['#ffffff','#00ff00'], B:['#ffffff','#0000ff'] },
  exclusion:   { R:['#000000','#ff0000'], G:['#000000','#00ff00'], B:['#000000','#0000ff'] },
};
function trackGradient(modeKey, ctlKey){
  const pair = TRACK_GRADIENTS[modeKey] && TRACK_GRADIENTS[modeKey][ctlKey];
  return pair ? `linear-gradient(90deg, ${pair[0]}, ${pair[1]})` : null;
}

function renderPanel(key){

  document.getElementById('resultRgbBtn_'+key).textContent = rgb.join(', ');

/* ---------- copy to clipboard ---------- */
function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try{ document.execCommand('copy'); }catch(err){}
  document.body.removeChild(ta);
}
function copyToClipboard(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).catch(()=>fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}
function flashCopied(btn){
  const isInput = btn.tagName === 'INPUT';
  const get = ()=> isInput ? btn.value : btn.textContent;
  const set = (v)=>{ if(isInput) btn.value = v; else btn.textContent = v; };
  if(btn._copyTimeout) clearTimeout(btn._copyTimeout);
  const original = btn.dataset.value || get();
  btn.dataset.value = original;
  set('Copied!');
  btn._copyTimeout = setTimeout(()=> set(btn.dataset.value), 800);
}
function renderAllPanels(){ MODE_ORDER.forEach(renderPanel); }

let allRenderScheduled = false;
function scheduleRenderAll(){
  if(allRenderScheduled) return;
  allRenderScheduled = true;
  requestAnimationFrame(()=>{ allRenderScheduled=false; renderAllPanels(); });
}

/* ---------- color sampling ---------- */
function contrastColor(hex){
  const [r,g,b] = hexToRgb(hex);
  const luminance = (0.299*r + 0.587*g + 0.114*b)/255;
  return luminance > 0.55 ? '#000000' : '#ffffff';
}
function colorizeButton(id, hex){
  const el = document.getElementById(id);
  el.style.background = hex;
  el.style.color = contrastColor(hex);
}
function decolorizeButton(id){
  const el = document.getElementById(id);
  el.style.background = '';
  el.style.color = '';
}

function applySampledColor(r,g,b){
  const hex = rgbToHex([r,g,b]);
  document.getElementById('colorPicker').value = hex;
  colorizeButton('chooseColorBtn', hex);

  state.additive.R = r; state.additive.G = g; state.additive.B = b;
  state.subtractive.C = Math.round((1-r/255)*100);
  state.subtractive.M = Math.round((1-g/255)*100);
  state.subtractive.Y = Math.round((1-b/255)*100);

  state.division.R = r; state.division.G = g; state.division.B = b;
  state.exclusion.R = r; state.exclusion.G = g; state.exclusion.B = b;

  resyncAllControls();
  scheduleRenderAll();
}

// re-reads `state` and pushes it into every panel's slider/color inputs
// (and their readouts). Used after sampling a color and after importing
// a saved file.
function resyncAllControls(){
  MODE_ORDER.forEach(key=>{
    const def = MODES[key];
    const wrap = document.getElementById('controls_'+key);
    const rows = wrap.querySelectorAll(def.type==='sliders' ? '.sliderow' : '.colorrow');
    def.controls.forEach((ctl,i)=>{
      const row = rows[i];
      const input = row.querySelector(def.type==='sliders' ? 'input[type=range]' : 'input[type=color]');
      const out = row.querySelector('.val95');
      input.value = state[key][ctl.key];
      out.value = state[key][ctl.key];
    });
  });
}

/* ---------- image eyedropper popup ---------- */
let pickFullCanvas = null, pickFullCtx = null;
let pickNaturalW = 0, pickNaturalH = 0, pickDisplayScale = 1;
let hasLoadedImage = false;

function openImagePicker(img){
  hasLoadedImage = true;
  pickNaturalW = img.naturalWidth;
  pickNaturalH = img.naturalHeight;

  // full-resolution offscreen copy, used for accurate pixel sampling
  pickFullCanvas = document.createElement('canvas');
  pickFullCanvas.width = pickNaturalW;
  pickFullCanvas.height = pickNaturalH;
  pickFullCtx = pickFullCanvas.getContext('2d');
  pickFullCtx.drawImage(img, 0, 0);

  // scaled-down display copy, sized to fit the popup
  const maxW = Math.min(560, window.innerWidth*0.85);
  const maxH = Math.min(420, window.innerHeight*0.6);
  pickDisplayScale = Math.min(1, maxW/pickNaturalW, maxH/pickNaturalH);
  const dispW = Math.max(1, Math.round(pickNaturalW*pickDisplayScale));
  const dispH = Math.max(1, Math.round(pickNaturalH*pickDisplayScale));

  const canvas = document.getElementById('imagePickCanvas');
  canvas.width = dispW; canvas.height = dispH;
  canvas.getContext('2d').drawImage(img, 0, 0, dispW, dispH);

  document.getElementById('imagePickOverlay').classList.add('show');
}

function pickPixelAt(clientX, clientY){
  const canvas = document.getElementById('imagePickCanvas');
  const rect = canvas.getBoundingClientRect();
  // map from the (possibly CSS-scaled) canvas box back to intrinsic pixels,
  // then from displayed/scaled pixels back to the original full-res image
  const canvasX = (clientX-rect.left) * (canvas.width/rect.width);
  const canvasY = (clientY-rect.top) * (canvas.height/rect.height);
  let ox = Math.floor(canvasX/pickDisplayScale);
  let oy = Math.floor(canvasY/pickDisplayScale);
  ox = Math.min(pickNaturalW-1, Math.max(0, ox));
  oy = Math.min(pickNaturalH-1, Math.max(0, oy));
  const d = pickFullCtx.getImageData(ox, oy, 1, 1).data;
  return {x:ox, y:oy, r:d[0], g:d[1], b:d[2]};
}

function updateDropzonePreview(ox, oy){
  const prev = document.getElementById('dropZonePreview');
  const pctx = prev.getContext('2d');
  const zoom = 6;
  const cropW = Math.max(1, Math.round(prev.width/zoom));
  const cropH = Math.max(1, Math.round(prev.height/zoom));
  let sx = ox - Math.floor(cropW/2), sy = oy - Math.floor(cropH/2);
  sx = Math.min(Math.max(0, sx), Math.max(0, pickNaturalW-cropW));
  sy = Math.min(Math.max(0, sy), Math.max(0, pickNaturalH-cropH));
  pctx.imageSmoothingEnabled = false;
  pctx.clearRect(0,0,prev.width,prev.height);
  pctx.drawImage(pickFullCanvas, sx, sy, cropW, cropH, 0, 0, prev.width, prev.height);
  // small crosshair marking the exact sampled point
  const px = (ox-sx+0.5) * (prev.width/cropW);
  const py = (oy-sy+0.5) * (prev.height/cropH);
  pctx.strokeStyle = 'rgba(255,0,0,0.85)';
  pctx.lineWidth = 1;
  pctx.beginPath();
  pctx.moveTo(px-5, py); pctx.lineTo(px+5, py);
  pctx.moveTo(px, py-5); pctx.lineTo(px, py+5);
  pctx.stroke();

  document.getElementById('dropZoneHint').style.display = 'none';
  prev.style.display = 'block';
}

// does nothing. Once a color is sitting in the swatch, Apply to Color /

function commitPickAt(px){
  lastPickedColor = {r:px.r, g:px.g, b:px.b};

/* ---------- export palette ---------- */
function shadeColor(rgb, amt){ return rgb.map(v=>Math.round(v*(1-amt))); }
function tintColor(rgb, amt){ return rgb.map(v=>Math.round(v+(255-v)*amt)); }

function buildPaletteSwatches(key){
  const def = MODES[key];
  const layers = def.layerColors(state[key]);
  const swatches = [];
  def.controls.forEach((ctl,i)=>{
    const base = layers[i];
    swatches.push({label:ctl.label+' (shade)', rgb:shadeColor(base,0.35)});
    swatches.push({label:ctl.label, rgb:base});
    swatches.push({label:ctl.label+' (tint)', rgb:tintColor(base,0.35)});
  });
  return swatches;
}
function exportPaletteJSON(swatches){
  return JSON.stringify(swatches.map(s=>({label:s.label, hex:rgbToHex(s.rgb), rgb:s.rgb})), null, 2);
}

/* ---------- save / import ---------- */

// Build a 2×2 composite PNG of all four venn canvases and return a data URL.
function buildCompositeDataURL(){
  const cols = 2, rows = 2;
  const src = document.getElementById('venn_' + MODE_ORDER[0]);
  const cw = src.width, ch = src.height;
  const out = document.createElement('canvas');
  out.width = cw * cols;
  out.height = ch * rows;
  const ctx = out.getContext('2d');
  MODE_ORDER.forEach((key, i)=>{
    const c = document.getElementById('venn_' + key);
    ctx.drawImage(c, (i % cols) * cw, Math.floor(i / cols) * ch);
  });
  return out.toDataURL('image/png');
}

function downloadDataURL(filename, dataUrl){
  const a = document.createElement('a');
  a.href = dataUrl; a.download = filename;

/* ---------- diary ---------- */
const DIARY_KEY = 'chroma.diary';
const DIARY_MAX = 36;
const DIARY_EXPORT_COLS = 6;
const DIARY_SW = 110, DIARY_SH = 110, DIARY_GAP = 6, DIARY_PAD = 16, DIARY_HEADER = 36;
const DIARY_JPEG_QUALITY = 0.92;
const LUM_R = 0.299, LUM_G = 0.587, LUM_B = 0.114, LUM_THRESH = 0.55;

let diaryColors;
try { diaryColors = JSON.parse(localStorage.getItem(DIARY_KEY)) || []; } catch(e) { diaryColors = []; }
let diaryLastColor = null;
let diaryCtxIdx = -1;
let diaryCtxColor = null;
let appCtxColor = null;

function diarySwatchTextColor(r,g,b){
  return (LUM_R*r + LUM_G*g + LUM_B*b)/255 > LUM_THRESH ? '#000' : '#fff';
}

function saveDiaryColors(){
  localStorage.setItem(DIARY_KEY, JSON.stringify(diaryColors));
}

function renderDiary(){
  const grid = document.getElementById('diaryGrid');
  document.getElementById('diaryCount').textContent = diaryColors.length + ' / ' + DIARY_MAX;
  grid.innerHTML = '';
  diaryColors.forEach((c, idx)=>{
    const tc = diarySwatchTextColor(c.r, c.g, c.b);
    const div = document.createElement('div');
    div.className = 'diary-swatch';
    div.style.background = c.hex;
    div.title = c.hex + ' — right-click to delete';
    const hexSpan = document.createElement('span');
    hexSpan.className = 'dsw-hex'; hexSpan.style.color = tc; hexSpan.textContent = c.hex;
    const rgbSpan = document.createElement('span');
    rgbSpan.className = 'dsw-rgb'; rgbSpan.style.color = tc; rgbSpan.textContent = c.r+','+c.g+','+c.b;
    div.appendChild(hexSpan); div.appendChild(rgbSpan);
    div.addEventListener('contextmenu', e=>{
      e.preventDefault(); e.stopPropagation();
      diaryCtxIdx = idx; diaryCtxColor = c;
      const menu = document.getElementById('cmDiaryCtxMenu');
      menu.style.left = e.clientX + 'px'; menu.style.top = e.clientY + 'px';
      menu.style.display = 'block';
    });
    grid.appendChild(div);
  });
  for(let i=diaryColors.length; i<DIARY_MAX; i++){
    const div = document.createElement('div'); div.className = 'diary-swatch empty'; grid.appendChild(div);
  }
}

function hideDiaryCtxMenu(){
  document.getElementById('cmDiaryCtxMenu').style.display = 'none';
  diaryCtxIdx = -1; diaryCtxColor = null;
}

function showAppCtxMenu(e, color){
  appCtxColor = color;
  const menu = document.getElementById('cmAppCtxMenu');
  menu.style.left = e.clientX + 'px';
  menu.style.top = e.clientY + 'px';
  menu.style.display = 'block';
}

function hideAppCtxMenu(){
  document.getElementById('cmAppCtxMenu').style.display = 'none';
  appCtxColor = null;
}

function openDiary(){
  renderDiary();
  document.getElementById('diaryOverlay').classList.add('show');
}

function closeDiary(){
  document.getElementById('diaryOverlay').classList.remove('show');
  hideDiaryCtxMenu();
}

function addToDiary(color){
  if(!color) return;
  if(diaryColors.length >= DIARY_MAX){ openInfoDialog('Diary is full (' + DIARY_MAX + ' colors max). Delete some to add more.', 'Color Diary', ''); return; }
  diaryColors.push({ hex: color.hex, r: color.r, g: color.g, b: color.b });
  saveDiaryColors();
  if(document.getElementById('diaryOverlay').classList.contains('show')) renderDiary();
}

function parseCssRgbColor(value){
  const match = value && value.match(/^rgba?\(([^)]+)\)$/i);
  if(!match) return null;
  const parts = match[1].split(',').map(part=>part.trim());
  if(parts.length < 3) return null;
  const alpha = parts[3] === undefined ? 1 : Number(parts[3]);
  if(!Number.isFinite(alpha) || alpha <= 0) return null;
  const rgb = parts.slice(0, 3).map(part=>Math.round(Number(part)));
  return rgb.every(part=>Number.isFinite(part) && part >= 0 && part <= 255) ? rgb : null;
}

function normalizeDiaryColor(color){
  if(!color) return null;
  const r = Number(color.r), g = Number(color.g), b = Number(color.b);
  if(!Number.isFinite(r) || !Number.isFinite(g) || !Number.isFinite(b)) return null;
  const rgb = [r, g, b].map(v=>Math.max(0, Math.min(255, Math.round(v))));
  return { r: rgb[0], g: rgb[1], b: rgb[2], hex: color.hex || rgbToHex(rgb) };
}

function textToDiaryColor(text){
  const value = (text || '').trim();
  if(!value) return null;
  if(/^#?[0-9a-f]{6}$/i.test(value)){
    const hex = value.startsWith('#') ? value : ('#' + value);
    const [r,g,b] = hexToRgb(hex);
    return { r, g, b, hex };
  }
  const rgbMatch = value.match(/^(\d{1,3})\s*,\s*(\d{1,3})\s*,\s*(\d{1,3})$/);
  if(!rgbMatch) return null;
  const rgb = rgbMatch.slice(1).map(Number);
  if(rgb.some(v=>v < 0 || v > 255)) return null;
  return { r: rgb[0], g: rgb[1], b: rgb[2], hex: rgbToHex(rgb) };
}

function elementToDiaryColor(el, inlineOnly){
  if(!el) return null;
  const colorValue = inlineOnly ? (el.style.background || el.style.backgroundColor) : getComputedStyle(el).backgroundColor;
  const rgb = parseCssRgbColor(colorValue);
  return rgb ? { r: rgb[0], g: rgb[1], b: rgb[2], hex: rgbToHex(rgb) } : null;
}

function canvasEventToDiaryColor(canvas, clientX, clientY){
  const rect = canvas.getBoundingClientRect();
  if(!rect.width || !rect.height) return null;
  const pixelX = Math.max(0, Math.min(canvas.width - 1, Math.floor((clientX - rect.left) * canvas.width / rect.width)));
  const pixelY = Math.max(0, Math.min(canvas.height - 1, Math.floor((clientY - rect.top) * canvas.height / rect.height)));
  const px = canvas.getContext('2d').getImageData(pixelX, pixelY, 1, 1).data;
  return { r: px[0], g: px[1], b: px[2], hex: rgbToHex([px[0], px[1], px[2]]) };
}

function resolveDiaryPlusColor(e){
  const target = e.target;
  const vennCanvas = target.closest('.vennc');
  if(vennCanvas) return canvasEventToDiaryColor(vennCanvas, e.clientX, e.clientY);
  if(target.id === 'imagePickCanvas' && pickFullCtx) return normalizeDiaryColor(pickPixelAt(e.clientX, e.clientY));

  const liveSwatch = target.closest('.paletteSwatch, .resultswatch');
  if(liveSwatch){
    const liveColor = elementToDiaryColor(liveSwatch, false);
    if(liveColor) return liveColor;
  }

  const rememberedSwatch = target.closest('#diaryLastSwatch, .miniSwatch');
  if(rememberedSwatch){
    const rememberedColor = elementToDiaryColor(rememberedSwatch, true);
    if(rememberedColor) return rememberedColor;
  }

  const valueEl = target.closest('.copyval, .val95');
  if(valueEl){
    const valueColor = textToDiaryColor(valueEl.value || valueEl.textContent);
    if(valueColor) return valueColor;
  }

  const colorInput = target.closest('input[type=color]');
  if(colorInput){
    const inputColor = textToDiaryColor(colorInput.value);
    if(inputColor) return inputColor;
  }

  const colorBtn = target.closest('#chooseColorBtn, #chooseBgBtn');
  if(colorBtn){
    const buttonColor = elementToDiaryColor(colorBtn, true);
    if(buttonColor) return buttonColor;
  }

  if(target.closest('#dropZonePreview') && lastPickedColor) return normalizeDiaryColor(lastPickedColor);
  return normalizeDiaryColor(diaryLastColor) || normalizeDiaryColor(lastPickedColor) || textToDiaryColor(document.getElementById('colorPicker').value);
}

function setLastClickedColor(r, g, b){
  const hex = rgbToHex([r, g, b]);
  diaryLastColor = { r, g, b, hex };
  document.getElementById('diaryLastSwatch').style.background = hex;
}

// Click any Venn canvas to capture a color into the swatch
MODE_ORDER.forEach(key=>{
  const canvas = document.getElementById('venn_' + key);
  canvas.style.cursor = 'crosshair';
  canvas.addEventListener('click', e=>{
    const rect = canvas.getBoundingClientRect();
    const pixelX = Math.max(0, Math.min(canvas.width - 1, Math.floor((e.clientX - rect.left) * canvas.width / rect.width)));
    const pixelY = Math.max(0, Math.min(canvas.height - 1, Math.floor((e.clientY - rect.top) * canvas.height / rect.height)));
    const px = canvas.getContext('2d').getImageData(pixelX, pixelY, 1, 1).data;
    setLastClickedColor(px[0], px[1], px[2]);
  });
});

document.getElementById('diaryAddBtn').addEventListener('click', ()=> addToDiary(diaryLastColor));
document.getElementById('diaryOpenBtn').addEventListener('click', openDiary);
document.getElementById('diaryX').addEventListener('click', closeDiary);
document.getElementById('diaryOverlay').addEventListener('click', e=>{ if(e.target.id === 'diaryOverlay') closeDiary(); });

document.getElementById('diaryClearBtn').addEventListener('click', ()=>{
  if(!diaryColors.length) return;
  if(!confirm('Clear all diary colors?')) return;
  diaryColors = []; saveDiaryColors(); renderDiary();
});

function diaryTimestampTag(){
  const n = new Date();
  return n.getFullYear() + String(n.getMonth()+1).padStart(2,'0') + String(n.getDate()).padStart(2,'0') + '-' +
         String(n.getHours()).padStart(2,'0') + String(n.getMinutes()).padStart(2,'0') + String(n.getSeconds()).padStart(2,'0');
}

document.getElementById('diaryExportBtn').addEventListener('click', ()=>{
  if(!diaryColors.length){ openInfoDialog('Diary is empty.', 'Color Diary', ''); return; }
  const rows = Math.ceil(diaryColors.length / DIARY_EXPORT_COLS);
  const cw = DIARY_EXPORT_COLS * DIARY_SW + (DIARY_EXPORT_COLS - 1) * DIARY_GAP + DIARY_PAD * 2;
  const ch = rows * DIARY_SH + (rows - 1) * DIARY_GAP + DIARY_PAD * 2 + DIARY_HEADER;
  const c = document.createElement('canvas'); c.width = cw; c.height = ch;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#c0c0c0'; ctx.fillRect(0, 0, cw, ch);
  ctx.fillStyle = '#000'; ctx.font = 'bold 13px Tahoma,Arial,sans-serif';
  ctx.textAlign = 'left'; ctx.fillText('colormixer95 — Color Diary', DIARY_PAD, DIARY_PAD + 14);
  diaryColors.forEach((color, i)=>{
    const col = i % DIARY_EXPORT_COLS, row = Math.floor(i / DIARY_EXPORT_COLS);
    const x = DIARY_PAD + col * (DIARY_SW + DIARY_GAP);
    const y = DIARY_PAD + DIARY_HEADER + row * (DIARY_SH + DIARY_GAP);
    ctx.fillStyle = color.hex; ctx.fillRect(x, y, DIARY_SW, DIARY_SH);
    ctx.strokeStyle = 'rgba(0,0,0,0.22)'; ctx.lineWidth = 1; ctx.strokeRect(x+0.5, y+0.5, DIARY_SW-1, DIARY_SH-1);
    const tc = diarySwatchTextColor(color.r, color.g, color.b);
    ctx.fillStyle = tc; ctx.font = 'bold 10px Tahoma,Arial,sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(color.hex, x + DIARY_SW/2, y + DIARY_SH/2 - 6);
    ctx.font = '9px Tahoma,Arial,sans-serif'; ctx.fillText(color.r+','+color.g+','+color.b, x + DIARY_SW/2, y + DIARY_SH/2 + 8);
  });
  const link = document.createElement('a');
  link.download = 'colormixer95-diary-' + diaryTimestampTag() + '.jpg';
  link.href = c.toDataURL('image/jpeg', DIARY_JPEG_QUALITY);
  link.click();
});

document.getElementById('cmDiaryCopyHex').addEventListener('click', e=>{
  e.stopPropagation();
  if(diaryCtxColor) copyToClipboard(diaryCtxColor.hex);
  hideDiaryCtxMenu();
});
document.getElementById('cmDiaryDelete').addEventListener('click', e=>{
  e.stopPropagation();
  if(diaryCtxIdx >= 0){ diaryColors.splice(diaryCtxIdx, 1); saveDiaryColors(); renderDiary(); }
  hideDiaryCtxMenu();
});
document.getElementById('cmAppDiaryAdd').addEventListener('click', e=>{
  e.stopPropagation();
  if(appCtxColor){
    setLastClickedColor(appCtxColor.r, appCtxColor.g, appCtxColor.b);
    addToDiary(appCtxColor);
  }
  hideAppCtxMenu();
});
document.addEventListener('contextmenu', e=>{
  if(e.target.closest('#cmDiaryCtxMenu, #cmAppCtxMenu')) return;
  const color = resolveDiaryPlusColor(e);
  if(!color) return;
  e.preventDefault();
  closeFileMenu();
  hideDiaryCtxMenu();
  showAppCtxMenu(e, color);
});
document.addEventListener('click', e=>{
  if(!document.getElementById('cmDiaryCtxMenu').contains(e.target)) hideDiaryCtxMenu();
  if(!document.getElementById('cmAppCtxMenu').contains(e.target)) hideAppCtxMenu();
});
window.addEventListener('storage', e=>{
  if(e.key === DIARY_KEY){
    try{ diaryColors = JSON.parse(e.newValue) || []; }catch(err){ diaryColors = []; }
    if(document.getElementById('diaryOverlay').classList.contains('show')) renderDiary();
  }
});
