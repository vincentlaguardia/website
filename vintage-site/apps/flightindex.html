<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>nyc_flight_sim</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: #c0c0c0;
    font-family: "Press Start 2P", "MS Sans Serif", monospace;
    overflow: hidden;
  }

  .win95 {
    background: #c0c0c0;
    border: 2px solid #fff;
    border-right-color: #000;
    border-bottom-color: #000;
    box-shadow: 1px 1px 0 #000, 2px 2px 0 #808080 inset;
    padding: 2px;
    width: 660px;
    user-select: none;
  }

  .titlebar {
    background: linear-gradient(90deg, #000080, #1084d0);
    color: #fff;
    font-size: 12px;
    padding: 3px 4px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    letter-spacing: 0.5px;
  }
  .titlebar .title {
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    overflow: hidden;
  }
  .titlebar .icon { font-size: 12px; }
  .winbtns { display: flex; gap: 2px; }
  .winbtns button {
    width: 16px; height: 14px;
    background: #c0c0c0;
    border: 1px solid #fff;
    border-right-color: #000;
    border-bottom-color: #000;
    font-size: 9px;
    line-height: 1;
    padding: 0;
    cursor: default;
    color: #000;
    font-family: monospace;
  }

  .menubar {
    background: #c0c0c0;
    font-size: 10px;
    padding: 3px 6px;
    display: flex;
    gap: 12px;
    border-bottom: 1px solid #808080;
    color: #000;
  }

  .screen-wrap {
    padding: 8px;
    background: #c0c0c0;
  }

  .bevel-in {
    border: 2px solid #808080;
    border-right-color: #fff;
    border-bottom-color: #fff;
    box-shadow: -1px -1px 0 #000 inset, 1px 1px 0 #dfdfdf inset;
    padding: 2px;
    background: #000;
  }

  canvas {
    display: block;
    width: 640px;
    height: 360px;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
    cursor: default;
  }

  .statusbar {
    display: flex;
    gap: 6px;
    padding: 4px 8px 8px;
    font-size: 9px;
    color: #000;
  }
  .statuspanel {
    flex: 1;
    background: #c0c0c0;
    border: 1px solid #808080;
    border-right-color: #fff;
    border-bottom-color: #fff;
    box-shadow: -1px -1px 0 #000 inset;
    padding: 3px 6px;
  }

  .footer-hint {
    text-align: center;
    font-size: 9px;
    color: #e8e8e8;
    margin-top: 10px;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<div>
  <div class="win95">
    <div class="titlebar">
      <div class="title"><span class="icon">&#9992;</span><span>nyc_flight_sim</span></div>
      <div class="winbtns">
        <button>_</button><button>&#9633;</button><button>X</button>
      </div>
    </div>
    <div class="screen-wrap">
      <div class="bevel-in">
        <canvas id="game" width="320" height="180"></canvas>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  var canvas = document.getElementById('game');
  var ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  var W = canvas.width;   // 320
  var H = canvas.height;  // 180
  var GROUND_H = 14;
  var GROUND_Y = H - GROUND_H;

  // ---- Palette (from the user-supplied swatch: muted sage / navy / steel / rust / cream) ----
  var PAL = {
    sky1: '#8fbcd4',
    sky2: '#bcd9e2',
    sky3: '#eed9b8',
    sky4: '#ffe9b8',
    sun: '#fff3c9',
    sunGlow: '#ffcf7a',
    bldgFar: '#9fc0cc',
    bldgNear1: '#2a160e',
    bldgNear2: '#603a27',
    window: '#ffe9b8',
    windowOff: '#7a95a3',
    ground: '#5f6a63',
    groundLine: '#93a68f',
    waterDeep: '#0f3f54',
    waterMid: '#1f6b8a',
    waterLight: '#5fc2e6',
    plane: '#9a9c8d',
    planeRed: '#603a27',
    planeDark: '#4a2c1a',
    cockpit: '#4f7580',
    text: '#d0d3ab',
    accent: '#93a68f',
    grass: '#3a5636',
    grassLine: '#4a6b45',
    trunk: '#3a2a1a',
    foliage: '#4f7a48',
    foliageLight: '#6f9a63',
    hull: '#2a160e',
    hullLight: '#603a27',
    cabin: '#9a9c8d',
    crane: '#5f7679',
    policeBody: '#111111',
    policeStripe: '#f0f0eb',
    policeBeaconBlue: '#3f6fa6',
    fireBody: '#b12822',
    ambulanceBody: '#e7e7e0',
    vehicleRoof: '#9aa3ac',
    fireCore: '#ffd27a',
    fireHot: '#ff5a1f',
    fireDeep: '#b32018',
    smokeMid: '#2e333a',
    smokeDark: '#181c21'
  };

  // ---- State ----
  var state = 'ready'; // ready | playing | dead
  var plane = { x: 46, y: H / 2, w: 50, h: 28, vy: 0 };
  var GRAVITY = 0.096; // 40% gentler than before, so the plane is easier to control
  var THRUST = -0.204; // 40% gentler than before, so the plane is easier to control
  var MAX_VY = 1.56; // 40% lower cap so it can't fling itself around as fast

  var buildings = [];
  var farBuildings = [];
  var distance = 0;
  var elapsed = 0;
  var baseSpeed = 0.858; // +30% from prior tuned baseline (0.66)
  var speed = baseSpeed;
  var maxSpeed = 2.808; // +30% from prior tuned top speed (2.16)
  var score = 0;
  var best = 0;
  var holding = false;
  var nextSpawnX = W;
  var nextFarSpawnX = W;
  var flashTimer = 0;
  var particles = [];
  var tick = 0;
  var milestoneSpawned = false;
  var WATER_END_SCORE = 45; // the map opens over water with no buildings until this score
  var PARK_LENGTH_DISTANCE = 120; // how far (in world units) the tree-lined park stretches past the shore
  var BUILDING_X_SHIFT = 12; // nudges every building a little further right
  var landReached = false;
  var crashTimer = 0;
  var explosionParticles = [];

  function rand(a, b) { return a + Math.random() * (b - a); }

  function resetGame() {
    plane.y = H / 2;
    plane.vy = 0;
    buildings = [];
    farBuildings = [];
    distance = 0;
    elapsed = 0;
    speed = baseSpeed;
    score = 0;
    nextSpawnX = W + 20;
    nextFarSpawnX = W;
    particles = [];
    explosionParticles = [];
    plumeParticles = [];
    vehicles = [];
    damagedBuilding = null;
    crashTimer = 0;
    shakeTime = 0;
    secondaryBlastTriggered = false;
    milestoneSpawned = false;
    landReached = false;
    state = 'playing';
  }

  function spawnBuilding() {
    var minGapAbove = Math.max(90, 150 - score * 0.4); // shrinks with score, floored (scaled for the bigger plane)
    var maxH = GROUND_Y - minGapAbove - 10;
    var isLow = Math.random() < 0.6; // bias toward more low buildings dotting the skyline
    var height = isLow ? rand(14, 40) : rand(40, Math.max(46, maxH));
    var width = rand(20, 34);
    buildings.push({
      x: nextSpawnX + BUILDING_X_SHIFT,
      w: width,
      h: height,
      color: Math.random() < 0.5 ? PAL.bldgNear1 : PAL.bldgNear2,
      windows: buildWindows(width, height)
    });
    var gapBetween = Math.max(28, rand(34, 60) - score * 0.4);
    nextSpawnX += width + gapBetween;
  }

  // A little park with trees, planted right where the water gives way to
  // land - a soft, green welcome before the skyline starts in earnest.
  function spawnTree() {
    // a dense, towering cluster of 3-5 trees (5x the old height and density)
    // packed nearly shoulder to shoulder
    var clusterSize = Math.floor(rand(3, 6));
    for (var i = 0; i < clusterSize; i++) {
      var height = rand(7, 12);
      var width = rand(9, 16);
      buildings.push({
        x: nextSpawnX + BUILDING_X_SHIFT,
        w: width,
        h: height,
        isTree: true
      });
      nextSpawnX += width + rand(2, 5); // packed tight within the cluster
    }
    nextSpawnX += rand(5, 12); // small breather, then the next dense cluster
  }

  // Out over the open water, before land is reached: boats bobbing at the
  // surface as you fly toward shore.
  function spawnHarborObstacle(distToShore) {
    var boatH = rand(8, 14);
    var boatW = rand(22, 34);
    buildings.push({
      x: nextSpawnX + BUILDING_X_SHIFT,
      w: boatW,
      h: boatH,
      isBoat: true,
      hasCabin: Math.random() < 0.5,
      color: PAL.hull
    });
    nextSpawnX += boatW + rand(50, 95);
  }

  function buildWindows(w, h) {
    var wins = [];
    var cols = Math.max(1, Math.floor(w / 6));
    var rows = Math.max(1, Math.floor(h / 8));
    for (var r = 0; r < rows; r++) {
      for (var c = 0; c < cols; c++) {
        wins.push({ x: 2 + c * 6, y: 3 + r * 8, on: Math.random() < 0.22 });
      }
    }
    return wins;
  }

  function spawnFarBuilding() {
    var height = rand(24, 60);
    var width = rand(24, 46);
    farBuildings.push({ x: nextFarSpawnX + BUILDING_X_SHIFT, w: width, h: height });
    nextFarSpawnX += width + rand(20, 40);
  }

  // A cluster of short warm-up buildings packed tight together, immediately
  // followed by the two very tall towers with a razor-thin flying gap.
  // The whole set appears once when the score hits exactly 25 - rising
  // straight out of the ocean, well before the water gives way to the
  // mainland skyline.
  function spawnMilestonePair() {
    if (nextSpawnX < W + 10) nextSpawnX = W + 10;

    // a row of short buildings, packed close together, right before the towers
    var shortWidth = 16;
    var shortGap = 7; // really close together
    var shortCount = 5;
    for (var s = 0; s < shortCount; s++) {
      var shortHeight = rand(18, 32);
      buildings.push({
        x: nextSpawnX + BUILDING_X_SHIFT,
        w: shortWidth,
        h: shortHeight,
        color: Math.random() < 0.5 ? PAL.bldgNear1 : PAL.bldgNear2,
        windows: buildWindows(shortWidth, shortHeight)
      });
      nextSpawnX += shortWidth + shortGap;
    }
    nextSpawnX += 36; // breathing room before the tall towers

    var baseHeight = GROUND_Y - 36;
    var height = baseHeight * 1.15; // 15% taller than the original tight gauntlet height
    var width = 26;
    var gapBetween = 14; // towers pulled in close together
    for (var k = 0; k < 2; k++) {
      buildings.push({
        x: nextSpawnX + BUILDING_X_SHIFT,
        w: width,
        h: height,
        color: PAL.bldgNear2,
        hazard: true,
        windows: buildWindows(width, height)
      });
      nextSpawnX += width + gapBetween;
    }
    nextSpawnX += 70; // breathing room after the towers
  }

  function checkMilestone() {
    // The two tall towers show up exactly once, right at score 50.
    if (!milestoneSpawned && score >= 25) {
      spawnMilestonePair();
      milestoneSpawned = true;
    }
  }

  // Shared world-scrolling logic (buildings, ground) used both while flying
  // and during the crash sequence, so the city keeps moving underneath the
  // wreckage instead of the whole screen freezing.
  function advanceWorld(dt) {
    distance += speed;
    for (var i = buildings.length - 1; i >= 0; i--) {
      buildings[i].x -= speed;
      if (buildings[i].x + buildings[i].w < -5) buildings.splice(i, 1);
    }
    for (var i = farBuildings.length - 1; i >= 0; i--) {
      farBuildings[i].x -= speed * 0.4;
      if (farBuildings[i].x + farBuildings[i].w < -5) farBuildings.splice(i, 1);
    }
    // Gate spawning on where the SPAWN POINT itself sits in world-space,
    // not the player's own score - the spawn point is far to the right of
    // the plane, so it crosses onto land well before the player's score
    // would suggest. This keeps trees appearing right at the leading edge
    // of the grass instead of lagging behind it.
    var shoreWorldX = WATER_END_SCORE * 8;
    var nextSpawnWorldX = distance + (nextSpawnX - plane.x);
    if (nextSpawnWorldX >= shoreWorldX) {
      landReached = true;
      if (buildings.length === 0 || buildings[buildings.length - 1].x < W) {
        if (nextSpawnWorldX < shoreWorldX + PARK_LENGTH_DISTANCE) {
          spawnTree();
        } else {
          spawnBuilding();
        }
      }
    } else {
      // still out over open water - populate it with boats, and cranes as
      // we get closer to shore (does not touch the grass/park/tree logic)
      if (buildings.length === 0 || buildings[buildings.length - 1].x < W) {
        spawnHarborObstacle(shoreWorldX - nextSpawnWorldX);
      }
    }
    var nextFarSpawnWorldX = distance + (nextFarSpawnX - plane.x);
    if (nextFarSpawnWorldX >= shoreWorldX) {
      if (farBuildings.length === 0 || farBuildings[farBuildings.length - 1].x < W) {
        spawnFarBuilding();
      }
    }
  }

  function update(dt) {
    if (state === 'crashing') {
      crashElapsed += dt;
      crashTimer -= dt;
      if (shakeTime > 0) shakeTime -= dt;
      updateExplosion(dt); // explosion keeps animating, but the city/ground hold still
      updatePlume(dt);
      updateVehicles(dt);
      if (crashTimer <= 0) state = 'dead';
      return;
    }
    if (state === 'dead') {
      updatePlume(dt); // the damaged building keeps smoldering behind the Game Over screen
      return;
    }
    if (state !== 'playing') return;
    tick++;
    elapsed += dt;
    speed = Math.min(maxSpeed, baseSpeed + elapsed * 0.006);
    advanceWorld(dt);
    score = Math.floor(distance / 8);
    if (score > best) best = score;
    checkMilestone();

    if (holding) {
      plane.vy += THRUST;
    } else {
      plane.vy += GRAVITY;
    }
    if (plane.vy > MAX_VY) plane.vy = MAX_VY;
    if (plane.vy < -MAX_VY) plane.vy = -MAX_VY;
    plane.y += plane.vy;

    if (holding && Math.random() < 0.6) {
      particles.push({ x: plane.x - 2, y: plane.y + plane.h / 2 + rand(-2, 2), life: 12, vx: -rand(0.8, 1.6) });
    }
    for (var i = particles.length - 1; i >= 0; i--) {
      particles[i].x += particles[i].vx;
      particles[i].life--;
      if (particles[i].life <= 0) particles.splice(i, 1);
    }

    // top boundary = crash
    if (plane.y < 2) {
      plane.y = 2;
      crash();
      return;
    }

    // collisions
    var px1 = plane.x + 8, px2 = plane.x + plane.w - 5;
    var py2 = plane.y + plane.h - 1;
    if (py2 >= GROUND_Y) {
      crash();
      return;
    }
    for (var i = 0; i < buildings.length; i++) {
      var b = buildings[i];
      if (px2 > b.x && px1 < b.x + b.w) {
        var topOfBuilding = GROUND_Y - b.h;
        if (py2 > topOfBuilding) {
          crash(b);
          return;
        }
      }
    }
  }

  var crashX = 0, crashY = 0;
  var crashElapsed = 0;
  var CRASH_DURATION_FRAMES = 1800; // dt is frame-normalized (~60fps), so 1800 ~= 30s
  var CRASH_OUT_OF_CONTROL_MULT = 1.9;
  var CRASH_SUPPRESS_BASE = 1.4;
  var CRASH_SUPPRESS_RECOVERY = 0.9;
  var CRASH_SMOKE_BASE_CHANCE = 0.15;
  var CRASH_SMOKE_GROWTH_CHANCE = 0.55;
  var CRASH_FIRE_BASE_CHANCE = 0.3;
  // fire size scaling coefficients: baseline flame size, growth contribution,
  // and late-crash intensity boost.
  var FIRE_SIZE_BASE = 0.65;
  var FIRE_SIZE_GROWTH_MULT = 0.8;
  var FIRE_SIZE_CRASH_MULT = 0.6;
  var EXTINGUISH_RATE_FAST = 0.0012;
  var EXTINGUISH_RATE_SLOW = 0.00058;
  var SECONDARY_BLAST_TRIGGER_PROGRESS = 0.9;
  var SECONDARY_BLAST_PRE_CAP = 0.96;
  var SECONDARY_BLAST_RESET_PROGRESS = 0.22;
  var SECONDARY_BLAST_MIN_ELAPSED = 520;
  var SECONDARY_BLAST_SCALE = 5.2;
  var SECONDARY_BLAST_FLASH_FRAMES = 34;
  var SECONDARY_BLAST_SHAKE_FRAMES = 44;
  var PLUME_VY_BASE_MAX = 0.85;
  var PLUME_VY_CRASH_GROWTH = 0.48;
  var FIRE_SIZE_SECONDARY_BLAST_MULT = 0.55;
  // several staggered follow-up bursts spread across the full 10s so the
  // explosion keeps re-flaring instead of just fading out early
  var explosionWaveTimes = [18, 38, 62, 95, 140, 200, 280, 380, 480];
  var explosionWaveDone = [];
  var damagedBuilding = null;
  var plumeParticles = [];
  var shakeTime = 0;
  var vehicles = [];
  var secondaryBlastTriggered = false;

  function crash(hitBuilding) {
    state = 'crashing';
    crashTimer = CRASH_DURATION_FRAMES; // a full 30 seconds before Game Over shows
    crashElapsed = 0;
    flashTimer = 16;
    shakeTime = 20;
    crashX = plane.x + plane.w / 2;
    crashY = plane.y + plane.h / 2;
    explosionWaveDone = explosionWaveTimes.map(function () { return false; });
    secondaryBlastTriggered = false;
    spawnRing(crashX, crashY);
    spawnRing(crashX, crashY, 6);
    spawnExplosion(crashX, crashY, true, 3.1); // +30% blast intensity
    spawnDebris(crashX, crashY);

    damagedBuilding = null;
    if (hitBuilding) {
      var topOfBuilding = GROUND_Y - hitBuilding.h;
      var impactX = Math.max(hitBuilding.x + 3, Math.min(crashX, hitBuilding.x + hitBuilding.w - 3));
      var impactY = Math.max(topOfBuilding + 3, Math.min(crashY, GROUND_Y - 3));
      hitBuilding.damaged = true;
      hitBuilding.damageLocalX = impactX - hitBuilding.x;
      hitBuilding.damageLocalY = impactY - topOfBuilding;
      damagedBuilding = hitBuilding;
      spawnDebris(impactX, impactY, hitBuilding.color || PAL.foliage);

      // the blast is big enough now that anything close by (like the other
      // tower in the tight gauntlet pair) gets damaged too
      var BLAST_RADIUS = 55;
      for (var bi = 0; bi < buildings.length; bi++) {
        var ob = buildings[bi];
        if (ob === hitBuilding || ob.damaged) continue;
        var gapDist = ob.x > hitBuilding.x
          ? ob.x - (hitBuilding.x + hitBuilding.w)
          : hitBuilding.x - (ob.x + ob.w);
        if (gapDist <= BLAST_RADIUS) {
          var obTop = GROUND_Y - ob.h;
          var obImpactY = Math.max(obTop + 3, Math.min(impactY, GROUND_Y - 3));
          var obImpactX = ob.x > hitBuilding.x ? ob.x + 3 : ob.x + ob.w - 3;
          ob.damaged = true;
          ob.damageLocalX = obImpactX - ob.x;
          ob.damageLocalY = obImpactY - obTop;
          spawnDebris(obImpactX, obImpactY, ob.color || PAL.foliage);
          spawnRing(obImpactX, obImpactY, 4);
        }
      }
    }
  }

  function updatePlume(dt) {
    // every damaged building keeps smoldering on its own, so a blast that
    // takes out an adjacent tower gets its own second column of smoke. The
    // fire builds for a while before crews get it under control, and only
    // dies out once enough fire trucks are actively working it.
    for (var bi = 0; bi < buildings.length; bi++) {
      var b = buildings[bi];
      if (!b.damaged || b.extinguished) continue;
      b.fireAge = (b.fireAge || 0) + dt;
      var growth = Math.min(1, b.fireAge / 360); // fire builds over ~6s
      var sprayers = b.activeSprayers || 0;
      var crashProgress = getCrashProgress();
      var outOfControl = 1 + crashProgress * CRASH_OUT_OF_CONTROL_MULT;
      var suppress = sprayers > 0 ? 1 / (1 + sprayers * (CRASH_SUPPRESS_BASE - crashProgress * CRASH_SUPPRESS_RECOVERY)) : 1;
      var topOfBuilding = GROUND_Y - b.h;
      var px = b.x + b.damageLocalX;
      var py = topOfBuilding + b.damageLocalY;
      var windDrift = 0.03 + crashProgress * 0.16 + (secondaryBlastTriggered ? 0.22 : 0);
      var smokeChance = Math.min(1, (CRASH_SMOKE_BASE_CHANCE + growth * CRASH_SMOKE_GROWTH_CHANCE) * outOfControl * suppress);
      if (Math.random() < smokeChance) {
        plumeParticles.push({
          x: px + rand(-3, 3), y: py + rand(-2, 2),
          vx: rand(-0.08, 0.08), vy: -rand(0.28, PLUME_VY_BASE_MAX + crashProgress * PLUME_VY_CRASH_GROWTH),
          drift: rand(windDrift * 0.5, windDrift),
          life: rand(130, 240), maxLife: 240,
          size: rand(5, 10 + crashProgress * 6),
          darkness: Math.min(1, rand(0.65, 0.9) + crashProgress * 0.22 + (secondaryBlastTriggered ? 0.15 : 0))
        });
      }
      // visible flame licking at the wound, growing right alongside the smoke
      var fireFury = 0.35 + growth * 0.8 + crashProgress * 1.45 + (secondaryBlastTriggered ? 0.5 : 0);
      var flameChance = Math.min(1, CRASH_FIRE_BASE_CHANCE * growth * fireFury * (0.5 + suppress * 0.5));
      if (Math.random() < flameChance) {
        explosionParticles.push({
          x: px + rand(-4, 4), y: py + rand(-2, 2),
          vx: rand(-0.25, 0.25), vy: -rand(0.2, 0.65 + crashProgress * 0.55),
          life: rand(16, 40), maxLife: 40, size: rand(2.6, 6.6) * (FIRE_SIZE_BASE + FIRE_SIZE_GROWTH_MULT * growth + crashProgress * FIRE_SIZE_CRASH_MULT + (secondaryBlastTriggered ? FIRE_SIZE_SECONDARY_BLAST_MULT : 0)),
          heat: Math.min(1, 0.45 + growth * 0.35 + crashProgress * 0.65 + (secondaryBlastTriggered ? 0.2 : 0)),
          type: 'fire'
        });
      }
    }
    for (var i = plumeParticles.length - 1; i >= 0; i--) {
      var p = plumeParticles[i];
      var pDrift = p.drift || 0;
      p.x += (p.vx + pDrift) * dt;
      p.y += p.vy * dt;
      p.vx += pDrift * 0.002 * dt;
      p.vy -= 0.004 * dt;
      p.size += 0.05 * dt;
      p.life -= dt;
      if (p.life <= 0) plumeParticles.splice(i, 1);
    }
  }

  // Emergency crews stream in for the whole 30-second crash sequence -
  // mostly fire trucks (which actually fight the fire), with ambulances and
  // police cars arriving too for the spectacle. They queue up on both sides
  // of the crash site, accumulating into a growing row of vehicles.
  var VEHICLE_TYPES = ['fire', 'fire', 'ambulance', 'fire', 'police', 'fire', 'ambulance', 'fire', 'police', 'fire'];

  function dispatchVehicleTo(b, type) {
    var slot = b.parkedCount || 0;
    b.parkedCount = slot + 1;
    var side = slot % 2 === 0 ? 1 : -1; // alternate which side of the building they queue on
    var slotIndex = Math.floor(slot / 2);
    var baseX = b.x + b.damageLocalX;
    var spacing = 17;
    var targetX = baseX + side * (14 + slotIndex * spacing);
    targetX = Math.max(6, Math.min(W - 6, targetX));
    var startX = side > 0 ? -22 : W + 22;
    vehicles.push({
      x: startX, targetX: targetX, state: 'driving', side: side,
      type: type, building: b, hoseTimer: 0
    });
  }

  function updateVehicles(dt) {
    // schedule a stream of arrivals - roughly 12-16 vehicles spread across
    // the whole 30-second linger
    for (var bi = 0; bi < buildings.length; bi++) {
      var b = buildings[bi];
      if (!b.damaged) continue;
      if (b.vehiclesSent === undefined) {
        b.vehiclesSent = 0;
        b.vehicleTarget = Math.floor(rand(12, 16));
        b.nextDispatchAt = 90;
      }
      if (b.vehiclesSent < b.vehicleTarget && crashElapsed >= b.nextDispatchAt) {
        var type = VEHICLE_TYPES[b.vehiclesSent % VEHICLE_TYPES.length];
        dispatchVehicleTo(b, type);
        b.vehiclesSent++;
        b.nextDispatchAt = crashElapsed + rand(85, 145);
      }
      b.activeSprayers = 0;
    }

    for (var i = 0; i < vehicles.length; i++) {
      var v = vehicles[i];
      if (v.state === 'driving') {
        var dir = v.targetX > v.x ? 1 : -1;
        v.x += dir * 1.7 * dt;
        if ((dir > 0 && v.x >= v.targetX) || (dir < 0 && v.x <= v.targetX)) {
          v.x = v.targetX;
          v.state = 'parked';
          if (v.type === 'fire') v.hoseTimer = rand(500, 800);
        }
      } else if (v.type === 'fire' && v.hoseTimer > 0) {
        v.hoseTimer -= dt;
      }
      if (v.type === 'fire' && v.state === 'parked' && v.hoseTimer > 0 && v.building) {
        v.building.activeSprayers = (v.building.activeSprayers || 0) + 1;
      }
    }

    // fire dies out only once enough cumulative spraying has been done -
    // the more trucks working it at once, the faster it goes out
    for (var bj = 0; bj < buildings.length; bj++) {
      var bb = buildings[bj];
      if (!bb.damaged || bb.extinguished) continue;
      if (bb.activeSprayers > 0 && (bb.fireAge || 0) > 300) {
        var extinguishRate = secondaryBlastTriggered ? EXTINGUISH_RATE_SLOW : EXTINGUISH_RATE_FAST;
        bb.extinguishProgress = (bb.extinguishProgress || 0) + bb.activeSprayers * extinguishRate * dt;
        if (!secondaryBlastTriggered) {
          if (bb.extinguishProgress > SECONDARY_BLAST_PRE_CAP) bb.extinguishProgress = SECONDARY_BLAST_PRE_CAP;
          if (bb.extinguishProgress >= SECONDARY_BLAST_TRIGGER_PROGRESS && crashElapsed > SECONDARY_BLAST_MIN_ELAPSED) {
            triggerSecondaryBlast(bb);
          }
        }
        if (bb.extinguishProgress >= 1) bb.extinguished = true;
      }
    }
  }

  function drawVehicle(v) {
    var vx = Math.round(v.x);
    var vy = GROUND_Y - 7;
    var bodyColor = v.type === 'ambulance' ? PAL.ambulanceBody : v.type === 'police' ? PAL.policeBody : PAL.fireBody;
    ctx.fillStyle = bodyColor;
    ctx.fillRect(vx - 8, vy, 16, 6);
    if (v.type === 'ambulance') {
      ctx.fillStyle = PAL.planeRed;
      ctx.fillRect(vx - 1, vy + 1, 2, 4);
      ctx.fillRect(vx - 2, vy + 2, 4, 2);
    } else if (v.type === 'police') {
      ctx.fillStyle = PAL.policeStripe;
      ctx.fillRect(vx - 2, vy + 2, 4, 1);
    }
    ctx.fillStyle = PAL.vehicleRoof;
    ctx.fillRect(v.side > 0 ? vx + 4 : vx - 8, vy - 3, 4, 3);
    ctx.fillStyle = PAL.planeDark;
    ctx.fillRect(vx - 6, vy + 5, 3, 3);
    ctx.fillRect(vx + 3, vy + 5, 3, 3);
    var blinkColor = v.type === 'police'
      ? (Math.floor(tick / 6) % 2 === 0 ? PAL.policeStripe : PAL.policeBeaconBlue)
      : PAL.window;
    if (Math.floor(tick / 8) % 2 === 0 || v.type === 'police') {
      ctx.fillStyle = blinkColor;
      ctx.fillRect(vx - 1, vy - 5, 2, 2);
    }
    if (v.type === 'fire' && v.state === 'parked' && v.hoseTimer > 0 && v.building) {
      var targetX = v.building.x + v.building.damageLocalX;
      var targetY = (GROUND_Y - v.building.h) + v.building.damageLocalY;
      ctx.fillStyle = PAL.waterLight;
      for (var s = 0; s < 5; s++) {
        var t = ((tick * 2 + s * 7) % 20) / 20;
        var sx = vx + (targetX - vx) * t;
        var sy = (vy - 2) + (targetY - (vy - 2)) * t - Math.sin(t * Math.PI) * 8;
        ctx.fillRect(Math.floor(sx), Math.floor(sy), 2, 2);
      }
    }
  }

  function drawVehicles() {
    for (var i = 0; i < vehicles.length; i++) {
      drawVehicle(vehicles[i]);
    }
  }

  function drawPlume() {
    for (var i = 0; i < plumeParticles.length; i++) {
      var p = plumeParticles[i];
      var t = Math.max(0, p.life / p.maxLife);
      ctx.fillStyle = (p.darkness || 0.7) > 0.82 ? PAL.smokeDark : PAL.smokeMid;
      ctx.globalAlpha = Math.min(0.85, (0.22 + (1 - t) * 0.6) * (p.darkness || 0.7));
      var s = Math.max(2, Math.round(p.size * (0.9 + (1 - t) * 1.7)));
      ctx.fillRect(Math.floor(p.x - s / 2), Math.floor(p.y - s / 2), s, s);
    }
    ctx.globalAlpha = 1;
  }

  function spawnRing(cx, cy, delay) {
    explosionParticles.push({ x: cx, y: cy, life: 16, maxLife: 16, delay: delay || 0, type: 'ring' });
  }

  // scale: overall size multiplier. reset: true clears old particles (first
  // blast), false appends on top (used for the staggered follow-up bursts
  // that make the explosion feel bigger and longer).
  function spawnExplosion(cx, cy, reset, scale) {
    scale = scale || 1;
    if (reset) explosionParticles = [];
    var fireCount = Math.round(28 * scale);
    var smokeCount = Math.round(20 * scale);
    for (var i = 0; i < fireCount; i++) {
      var ang = rand(0, Math.PI * 2);
      var spd = rand(0.8, 4.4) * scale;
      explosionParticles.push({
        x: cx + rand(-3, 3), y: cy + rand(-3, 3),
        vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd - 0.6,
        life: rand(20, 40) * (0.7 + 0.3 * scale),
        maxLife: 40 * (0.7 + 0.3 * scale),
        size: rand(3, 6) * scale,
        heat: rand(0.55, 1),
        type: 'fire'
      });
    }
    for (var i = 0; i < smokeCount; i++) {
      var ang2 = rand(-Math.PI * 0.9, -Math.PI * 0.1);
      var spd2 = rand(0.2, 0.9) * scale;
      explosionParticles.push({
        x: cx + rand(-6, 6), y: cy + rand(-6, 6),
        vx: Math.cos(ang2) * spd2 + rand(-0.1, 0.1), vy: Math.sin(ang2) * spd2 - 0.2,
        life: rand(70, 130) * (0.7 + 0.3 * scale),
        maxLife: 130 * (0.7 + 0.3 * scale),
        size: rand(2, 5) * scale,
        drift: rand(0.02, 0.15),
        darkness: rand(0.55, 0.9),
        type: 'smoke'
      });
    }
  }

  function spawnDebris(cx, cy, buildingColor) {
    var colors = buildingColor
      ? [buildingColor, buildingColor, PAL.groundLine, PAL.window, PAL.planeRed]
      : [PAL.planeRed, PAL.plane, PAL.cockpit, PAL.planeDark];
    var count = buildingColor ? 23 : 18;
    for (var i = 0; i < count; i++) {
      var ang = rand(-Math.PI * 0.95, -Math.PI * 0.05);
      var spd = rand(1.8, 5.7);
      explosionParticles.push({
        x: cx, y: cy,
        vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd - 1.3,
        life: 400, maxLife: 400,
        size: rand(2, 5),
        color: colors[i % colors.length],
        settled: false,
        type: 'debris'
      });
    }
  }

  var explosionWaveScales = [1.8, 0.9, 2.1, 0.8, 1.6, 0.7, 1.7, 0.8, 1.2];

  function triggerSecondaryBlast(b) {
    if (secondaryBlastTriggered) return;
    secondaryBlastTriggered = true;
    var bx = b ? b.x + b.damageLocalX : crashX;
    var by = b ? (GROUND_Y - b.h) + b.damageLocalY : crashY;
    spawnRing(bx, by);
    spawnRing(bx, by, 4);
    spawnRing(bx, by, 8);
    spawnExplosion(bx, by, false, SECONDARY_BLAST_SCALE);
    spawnExplosion(bx + rand(-8, 8), by + rand(-6, 6), false, SECONDARY_BLAST_SCALE * 0.78);
    spawnDebris(bx, by, b && b.color ? b.color : PAL.bldgNear2);
    flashTimer = Math.max(flashTimer, SECONDARY_BLAST_FLASH_FRAMES);
    shakeTime = Math.max(shakeTime, SECONDARY_BLAST_SHAKE_FRAMES);
    for (var bi = 0; bi < buildings.length; bi++) {
      var bb = buildings[bi];
      if (!bb.damaged) continue;
      var progress = bb.extinguishProgress || 0;
      if (progress < 1) {
        bb.extinguished = false;
        bb.extinguishProgress = Math.min(SECONDARY_BLAST_RESET_PROGRESS, progress);
      }
      bb.fireAge = Math.max(bb.fireAge || 0, SECONDARY_BLAST_MIN_ELAPSED);
    }
  }

  function getCrashProgress() {
    return Math.min(1, crashElapsed / CRASH_DURATION_FRAMES);
  }

  function updateExplosion(dt) {
    var crashProgress = getCrashProgress();
    var blastBoost = secondaryBlastTriggered ? 0.32 : 0;
    for (var w = 0; w < explosionWaveTimes.length; w++) {
      if (!explosionWaveDone[w] && crashElapsed >= explosionWaveTimes[w]) {
        explosionWaveDone[w] = true;
        var s = explosionWaveScales[w] || 0.7;
        spawnRing(crashX + rand(-6, 6), crashY + rand(-4, 4));
        spawnExplosion(crashX + rand(-9, 9), crashY + rand(-7, 7), false, s);
        flashTimer = Math.max(flashTimer, Math.round(6 * s));
        shakeTime = Math.max(shakeTime, Math.round(10 * s));
      }
    }
    // continuous ember + smoke trickle so the wreckage keeps visibly
    // smoldering for the whole crash sequence, not just the initial burst
    if (Math.random() < Math.min(1, 0.62 + crashProgress * 0.38 + blastBoost)) {
      explosionParticles.push({
        x: crashX + rand(-9, 9), y: crashY + rand(-6, 6),
        vx: rand(-0.45, 0.45), vy: -rand(0.35, 0.9 + crashProgress * 0.6),
        life: rand(20, 56), maxLife: 56, size: rand(3.2, 7.6 + crashProgress * 3.2 + (secondaryBlastTriggered ? 2.4 : 0)),
        heat: Math.min(1, 0.6 + crashProgress * 0.45 + (secondaryBlastTriggered ? 0.25 : 0)),
        type: 'fire'
      });
    }
    if (Math.random() < Math.min(1, 0.68 + crashProgress * 0.42 + blastBoost)) {
      explosionParticles.push({
        x: crashX + rand(-11, 11), y: crashY + rand(-9, 9),
        vx: rand(-0.08, 0.18), vy: -rand(0.3, 0.72 + crashProgress * 0.48),
        life: rand(90, 190), maxLife: 190, size: rand(5, 11.5 + crashProgress * 4.2 + (secondaryBlastTriggered ? 4.6 : 0)),
        drift: rand(0.06, 0.22 + (secondaryBlastTriggered ? 0.12 : 0)),
        darkness: Math.min(1, rand(0.6, 0.95) + crashProgress * 0.2 + (secondaryBlastTriggered ? 0.18 : 0)),
        type: 'smoke'
      });
    }
    for (var i = explosionParticles.length - 1; i >= 0; i--) {
      var p = explosionParticles[i];
      if (p.type === 'ring') {
        if (p.delay > 0) { p.delay -= dt; continue; }
        p.life -= dt;
        if (p.life <= 0) explosionParticles.splice(i, 1);
        continue;
      }
      if (p.type === 'debris' && p.settled) {
        p.life -= dt;
        if (p.life <= 0) explosionParticles.splice(i, 1);
        continue;
      }
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      if (p.type === 'smoke') {
        var smokeDrift = p.drift || 0;
        p.x += smokeDrift * dt;
        p.vx += smokeDrift * 0.0015 * dt;
        p.vy -= 0.012 * dt;
        p.size += 0.02 * dt;
      } else if (p.type === 'debris') {
        p.vy += 0.14 * dt; // heavier gravity than embers
        if (p.y >= GROUND_Y - 1) {
          p.y = GROUND_Y - 1;
          p.vy = 0;
          p.vx *= 0.6;
          if (Math.abs(p.vx) < 0.05) p.settled = true;
        }
      } else {
        p.vy += 0.045 * dt; // fire embers fall back a little
      }
      p.life -= dt;
      if (p.life <= 0) explosionParticles.splice(i, 1);
    }
  }

  function drawExplosion() {
    for (var i = 0; i < explosionParticles.length; i++) {
      var p = explosionParticles[i];
      var t = Math.max(0, p.life / p.maxLife);
      if (p.type === 'ring') {
        var r = (1 - t) * 29;
        ctx.strokeStyle = PAL.window;
        ctx.globalAlpha = t * 0.8;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        ctx.stroke();
      } else if (p.type === 'debris') {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.settled ? Math.min(1, t * 2) : 1;
        ctx.fillRect(Math.floor(p.x - p.size / 2), Math.floor(p.y - p.size / 2), Math.ceil(p.size), Math.ceil(p.size));
      } else if (p.type === 'fire') {
        // three-stage cooling: hot core -> orange flame -> deep red ember
        var heat = p.heat === undefined ? 0.7 : p.heat;
        var heatStage = t * (0.75 + heat * 0.55);
        ctx.fillStyle = heatStage > 0.72 ? PAL.fireCore : (heatStage > 0.34 ? PAL.fireHot : PAL.fireDeep);
        ctx.globalAlpha = Math.min(1, 0.45 + t * (0.8 + heat * 0.3));
        var s = Math.max(1, Math.round(p.size * (0.6 + t * (0.75 + heat * 0.35))) + 1);
        ctx.fillRect(Math.floor(p.x - s / 2), Math.floor(p.y - s / 2), s, s);
      } else {
        // smoke billows larger as it ages, and stays dark enough to cloud the sky
        ctx.fillStyle = (p.darkness || 0.7) > 0.82 ? PAL.smokeDark : PAL.smokeMid;
        ctx.globalAlpha = Math.min(0.75, (0.18 + (1 - t) * 0.62) * (p.darkness || 0.7));
        var s2 = Math.max(1, Math.round(p.size * (0.85 + 1.8 * (1 - t))));
        ctx.fillRect(Math.floor(p.x - s2 / 2), Math.floor(p.y - s2 / 2), s2, s2);
      }
    }
    ctx.globalAlpha = 1;
  }

  function drawPixelPlane(x, y, vy) {
    // side-view high-wing prop plane, nose pointing right, drawn on a 20x12
    // grid then scaled to match plane.w so the pixel-art blocks stay chunky.
    // Wing sits ON TOP of the fuselage (Cessna-style) instead of hanging
    // below it, so it reads as a plane rather than a floatplane/pontoons.
    var scale = plane.w / 20;
    var tilt = Math.max(-1, Math.min(1, vy / MAX_VY));
    ctx.save();
    ctx.translate(x + plane.w / 2, y + plane.h / 2);
    ctx.rotate(tilt * 0.25);
    ctx.scale(scale, scale);
    ctx.translate(-9.5, -4.5);

    // tail fin (vertical stabilizer)
    ctx.fillStyle = PAL.planeDark;
    ctx.fillRect(0, 1, 3, 4);
    // horizontal tail stabilizer
    ctx.fillStyle = PAL.plane;
    ctx.fillRect(0, 4, 3, 1);
    // fuselage
    ctx.fillStyle = PAL.planeRed;
    ctx.fillRect(2, 5, 12, 3);
    // nose taper
    ctx.fillStyle = PAL.planeDark;
    ctx.fillRect(14, 6, 2, 1);
    ctx.fillRect(16, 6, 1, 1);
    // spinner
    ctx.fillStyle = PAL.planeDark;
    ctx.fillRect(17, 6, 1, 1);
    // high-mounted main wing (straight bar above the fuselage)
    ctx.fillStyle = PAL.plane;
    ctx.fillRect(4, 3, 12, 1);
    // strut connecting wing to fuselage
    ctx.fillRect(8, 4, 1, 1);
    // cockpit canopy
    ctx.fillStyle = PAL.cockpit;
    ctx.fillRect(11, 4, 2, 1);
    ctx.restore();
  }

  function drawBackground() {
    var grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    grad.addColorStop(0, PAL.sky1);
    grad.addColorStop(0.45, PAL.sky2);
    grad.addColorStop(0.75, PAL.sky3);
    grad.addColorStop(1, PAL.sky4);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, GROUND_Y);

    ctx.fillStyle = PAL.sunGlow;
    ctx.beginPath();
    ctx.arc(W - 60, 46, 22, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = PAL.sun;
    ctx.beginPath();
    ctx.arc(W - 60, 46, 15, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = PAL.bldgFar;
    for (var i = 0; i < farBuildings.length; i++) {
      var b = farBuildings[i];
      ctx.fillRect(Math.floor(b.x), GROUND_Y - b.h, Math.ceil(b.w), b.h);
    }
  }

  function drawTree(b, bx, by) {
    var trunkW = Math.max(2, Math.round(b.w * 0.28));
    var trunkH = Math.max(4, Math.round(b.h * 0.35));
    var canopyH = b.h - trunkH;
    ctx.fillStyle = PAL.trunk;
    ctx.fillRect(Math.round(bx + b.w / 2 - trunkW / 2), GROUND_Y - trunkH, trunkW, trunkH + 4);
    if (b.damaged) {
      ctx.fillStyle = PAL.planeDark;
      ctx.fillRect(bx, by + canopyH * 0.25, b.w, canopyH * 0.6);
      ctx.fillStyle = '#050b0f';
      ctx.fillRect(bx + b.w * 0.25, by + canopyH * 0.15, b.w * 0.5, canopyH * 0.4);
    } else {
      ctx.fillStyle = PAL.foliage;
      ctx.fillRect(bx, by, b.w, canopyH);
      ctx.fillStyle = PAL.foliageLight;
      ctx.fillRect(bx + 1, by, Math.max(1, b.w - 4), Math.max(1, Math.round(canopyH * 0.4)));
    }
  }

  function drawBoat(b, bx, by) {
    var deckH = b.h * 0.4;
    var hullY = by + deckH;
    if (b.damaged) {
      ctx.fillStyle = PAL.planeDark;
      ctx.fillRect(bx, hullY, b.w, b.h - deckH + 4);
      ctx.fillStyle = '#050b0f';
      ctx.fillRect(bx + b.w * 0.3, by, b.w * 0.4, deckH);
      return;
    }
    // hull
    ctx.fillStyle = PAL.hull;
    ctx.fillRect(bx, hullY, b.w, b.h - deckH + 4);
    // deck / upper hull band
    ctx.fillStyle = PAL.hullLight;
    ctx.fillRect(bx + 2, by, Math.max(1, b.w - 4), deckH);
    // small deckhouse cabin
    if (b.hasCabin) {
      ctx.fillStyle = PAL.cabin;
      ctx.fillRect(bx + b.w * 0.35, by - deckH, b.w * 0.3, deckH);
    }
  }

  function drawCrane(b, bx, by) {
    var mastW = Math.max(2, Math.round(b.w * 0.4));
    var mastX = bx + (b.boomSide > 0 ? 0 : b.w - mastW);
    var color = b.damaged ? PAL.planeDark : PAL.crane;
    // mast
    ctx.fillStyle = color;
    ctx.fillRect(mastX, by, mastW, b.h + 4);
    // horizontal boom near the top
    var boomY = by + 3;
    var boomX = b.boomSide > 0 ? mastX + mastW : mastX - b.boomLen;
    var boomW = b.boomLen + mastW;
    ctx.fillRect(Math.min(mastX, boomX), boomY, boomW, 2);
    // hook/warning tip at the end of the boom
    if (!b.damaged) {
      ctx.fillStyle = PAL.window;
      var tipX = b.boomSide > 0 ? boomX + b.boomLen - 2 : boomX;
      ctx.fillRect(tipX, boomY + 2, 2, 2);
    }
  }

  function drawBuildings() {
    var blinkOn = Math.floor(tick / 18) % 2 === 0;
    for (var i = 0; i < buildings.length; i++) {
      var b = buildings[i];
      var bx = Math.floor(b.x), by = GROUND_Y - b.h;
      if (b.isTree) {
        drawTree(b, bx, by);
        continue;
      }
      if (b.isBoat) {
        drawBoat(b, bx, by);
        continue;
      }
      if (b.isCrane) {
        drawCrane(b, bx, by);
        continue;
      }
      ctx.fillStyle = b.color;
      ctx.fillRect(bx, by, Math.ceil(b.w), b.h + 4);
      for (var j = 0; j < b.windows.length; j++) {
        var win = b.windows[j];
        if (win.y < b.h - 2) {
          if (b.damaged) {
            var dwx = win.x - b.damageLocalX, dwy = win.y - b.damageLocalY;
            if (dwx * dwx + dwy * dwy < 64) continue; // blown out - no window here
          }
          ctx.fillStyle = win.on ? PAL.window : PAL.windowOff;
          ctx.fillRect(bx + win.x, by + win.y, 2, 3);
        }
      }
      if (b.damaged) {
        var hx = bx + b.damageLocalX, hy = by + b.damageLocalY;
        // soot smudge radiating from the impact
        ctx.fillStyle = PAL.planeDark;
        ctx.globalAlpha = 0.5;
        ctx.fillRect(hx - 9, hy - 7, 18, 15);
        ctx.globalAlpha = 1;
        // blown-out dark cavity
        ctx.fillStyle = '#050b0f';
        ctx.fillRect(hx - 6, hy - 5, 12, 10);
        // jagged rubble chunks around the hole's edge
        ctx.fillStyle = PAL.groundLine;
        ctx.fillRect(hx - 8, hy - 2, 3, 3);
        ctx.fillRect(hx + 6, hy - 4, 3, 3);
        ctx.fillRect(hx - 3, hy + 5, 4, 3);
        ctx.fillRect(hx + 4, hy + 4, 3, 3);
        ctx.fillRect(hx - 7, hy + 4, 3, 2);
      }
      if (b.hazard) {
        // warning stripes near the top
        ctx.fillStyle = PAL.window;
        for (var s = 2; s < b.w - 2; s += 6) {
          ctx.fillRect(bx + s, by + 3, 3, 2);
        }
        // antenna + blinking obstruction light
        var midX = bx + Math.floor(b.w / 2) - 1;
        ctx.fillStyle = b.color;
        ctx.fillRect(midX, by - 6, 2, 6);
        if (blinkOn) {
          ctx.fillStyle = PAL.accent;
          ctx.fillRect(midX - 1, by - 8, 4, 3);
        }
      }
    }
  }

  function drawWaveLine(y, amplitude, wavelength, phase, color, thickness) {
    ctx.fillStyle = color;
    for (var x = 0; x < W; x += 2) {
      var yy = y + Math.round(Math.sin((x + phase) / wavelength * Math.PI * 2) * amplitude);
      ctx.fillRect(x, yy, 2, thickness);
    }
  }

  function drawWaterBand() {
    // bright horizon line where the sky meets the sea
    ctx.fillStyle = PAL.window;
    ctx.fillRect(0, GROUND_Y, W, 1);
    // strong, unmistakably blue water body
    ctx.fillStyle = PAL.waterDeep;
    ctx.fillRect(0, GROUND_Y + 1, W, GROUND_H - 1);
    ctx.fillStyle = PAL.waterMid;
    ctx.fillRect(0, GROUND_Y + 5, W, GROUND_H - 5);

    // sinusoidal wave crests/troughs, each scrolling at its own speed
    drawWaveLine(GROUND_Y + 2, 1, 15, distance * 1.5, PAL.waterLight, 1);
    drawWaveLine(GROUND_Y + 5, 1.5, 11, distance * 1.0 + 6, PAL.waterLight, 2);
    drawWaveLine(GROUND_Y + 8, 1.5, 9, distance * 0.75 + 3, PAL.sky1, 1);
    drawWaveLine(GROUND_Y + 11, 1, 8, distance * 1.8 + 9, PAL.waterLight, 1);

    // scattered twinkling foam/sparkle flecks
    var sparkleOff = Math.floor(distance * 1.2);
    for (var sx = 0; sx < W; sx += 27) {
      var wx = (sx - sparkleOff % 27 + 270) % (W + 27);
      var twinkle = Math.floor((tick + sx) / 10) % 3 === 0;
      if (twinkle) {
        ctx.fillStyle = PAL.window;
        ctx.globalAlpha = 0.8;
        ctx.fillRect(wx, GROUND_Y + 6 + (sx % 5), 2, 1);
        ctx.globalAlpha = 1;
      }
    }

    // shimmering glint reflecting the sun down onto the water
    var sunX = W - 60;
    var glintOn = Math.floor(tick / 6) % 2 === 0;
    ctx.fillStyle = PAL.window;
    ctx.globalAlpha = glintOn ? 0.9 : 0.45;
    ctx.fillRect(sunX - 1, GROUND_Y + 2, 3, 2);
    ctx.fillRect(sunX + 4, GROUND_Y + 6, 2, 1);
    ctx.fillRect(sunX - 5, GROUND_Y + 9, 2, 1);
    ctx.globalAlpha = 1;
  }

  function drawLandBand() {
    ctx.fillStyle = PAL.ground;
    ctx.fillRect(0, GROUND_Y, W, GROUND_H);
    ctx.fillStyle = PAL.groundLine;
    var offset = Math.floor(distance) % 16;
    for (var x3 = -offset; x3 < W; x3 += 16) {
      ctx.fillRect(x3, GROUND_Y + 6, 8, 2);
    }
  }

  function drawParkBand() {
    ctx.fillStyle = PAL.grass;
    ctx.fillRect(0, GROUND_Y, W, GROUND_H);
    ctx.fillStyle = PAL.grassLine;
    var offset = Math.floor(distance * 0.9) % 12;
    for (var x4 = -offset; x4 < W; x4 += 12) {
      ctx.fillRect(x4, GROUND_Y + 4, 5, 1);
      ctx.fillRect(x4 + 3, GROUND_Y + 9, 5, 1);
    }
  }

  // The water-to-land transition (and the little park just past it) are
  // fixed points out in the world, not score checks applied to the whole
  // screen, so they sweep across the screen like a real coastline instead
  // of the ground instantly flipping.
  function drawGround() {
    var waterEndDistance = WATER_END_SCORE * 8;
    var shoreScreenX = plane.x + waterEndDistance - distance;
    var waterW = Math.max(0, Math.min(W, shoreScreenX));
    // Grass ends exactly at the left edge of the nearest real city building
    // currently on screen (recomputed fresh every frame from the actual
    // buildings array), so it can never render underneath one - regardless
    // of spawn timing.
    var parkEndScreenX = W + 999;
    for (var pi = 0; pi < buildings.length; pi++) {
      var pb = buildings[pi];
      if (!pb.isTree && !pb.isBoat && !pb.isCrane && pb.x < parkEndScreenX) {
        parkEndScreenX = pb.x;
      }
    }
    var parkW = Math.max(waterW, Math.min(W, parkEndScreenX));

    if (waterW > 0) {
      ctx.save();
      ctx.beginPath();
      ctx.rect(0, GROUND_Y, waterW, GROUND_H + 4);
      ctx.clip();
      drawWaterBand();
      ctx.restore();
    }
    if (parkW > waterW) {
      ctx.save();
      ctx.beginPath();
      ctx.rect(waterW, GROUND_Y, parkW - waterW, GROUND_H + 4);
      ctx.clip();
      drawParkBand();
      ctx.restore();
    }
    if (parkW < W) {
      ctx.save();
      ctx.beginPath();
      ctx.rect(parkW, GROUND_Y, W - parkW, GROUND_H + 4);
      ctx.clip();
      drawLandBand();
      ctx.restore();
    }
    // bright shoreline/foam seam where water meets the park
    if (waterW > 0 && waterW < W) {
      ctx.fillStyle = PAL.window;
      ctx.globalAlpha = 0.85;
      ctx.fillRect(Math.floor(waterW) - 1, GROUND_Y, 2, GROUND_H);
      ctx.globalAlpha = 1;
    }
  }

  function drawParticles() {
    ctx.fillStyle = PAL.plane;
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      ctx.globalAlpha = Math.max(0, p.life / 12);
      ctx.fillRect(Math.floor(p.x), Math.floor(p.y), 2, 2);
    }
    ctx.globalAlpha = 1;
  }

  function pixelText(str, x, y, color, size) {
    ctx.fillStyle = color || PAL.text;
    ctx.font = (size || 8) + 'px "Press Start 2P", monospace';
    ctx.textBaseline = 'top';
    ctx.fillText(str, x, y);
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    if (shakeTime > 0) {
      var shakeMag = Math.min(6, shakeTime * 0.35);
      ctx.translate(rand(-shakeMag, shakeMag), rand(-shakeMag, shakeMag));
    }
    drawBackground();
    drawBuildings();
    drawPlume();
    drawGround();
    drawVehicles();
    drawParticles();
    if (state === 'ready' || state === 'playing') {
      drawPixelPlane(plane.x, plane.y, plane.vy);
    }
    drawExplosion();
    ctx.restore();

    if (flashTimer > 0) {
      ctx.fillStyle = 'rgba(255,255,255,' + (flashTimer / 8) + ')';
      ctx.fillRect(0, 0, W, H);
      flashTimer--;
    }

    pixelText('SCORE ' + score, 6, 6, PAL.text, 8);
    pixelText('BEST ' + best, 6, 16, PAL.accent, 8);

    if (state === 'ready') {
      ctx.fillStyle = 'rgba(13,25,34,0.65)';
      ctx.fillRect(0, 0, W, H);
      pixelText('SKYLINE RUNNER', W / 2 - 78, H / 2 - 30, PAL.text, 9);
      pixelText('HOLD SPACE / CLICK', W / 2 - 74, H / 2 - 6, PAL.accent, 7);
      pixelText('TO CLIMB', W / 2 - 30, H / 2 + 6, PAL.accent, 7);
      pixelText('PRESS TO START', W / 2 - 62, H / 2 + 26, PAL.text, 7);
    } else if (state === 'dead') {
      ctx.fillStyle = 'rgba(13,25,34,0.7)';
      ctx.fillRect(0, 0, W, H);
      pixelText('GAME OVER', W / 2 - 46, H / 2 - 20, PAL.text, 9);
      pixelText('SCORE ' + score, W / 2 - 40, H / 2 + 2, PAL.accent, 7);
      pixelText('CLICK TO RETRY', W / 2 - 60, H / 2 + 22, PAL.groundLine, 7);
    }
  }

  var lastTime = null;
  function loop(ts) {
    if (lastTime === null) lastTime = ts;
    var dt = (ts - lastTime) / 16.6667;
    lastTime = ts;
    if (dt > 3) dt = 3;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function pressStart() {
    if (state === 'ready' || state === 'dead') {
      resetGame();
    }
    holding = true;
  }

  function release() {
    holding = false;
  }

  function isSpaceKey(e) {
    // keep keyCode fallback for legacy browsers / embedded webviews that only report keyCode
    return e.code === 'Space' || e.key === ' ' || e.key === 'Spacebar' || e.keyCode === 32;
  }

  canvas.tabIndex = 0;
  canvas.setAttribute('aria-label', 'Flight simulator game canvas');
  canvas.focus();

  window.addEventListener('keydown', function (e) {
    if (isSpaceKey(e)) {
      e.preventDefault();
      if (!holding) pressStart();
      holding = true;
    }
  });
  window.addEventListener('keyup', function (e) {
    if (isSpaceKey(e)) {
      e.preventDefault();
      release();
    }
  });
  canvas.addEventListener('mousedown', function (e) { e.preventDefault(); canvas.focus(); pressStart(); });
  window.addEventListener('mouseup', release);
  canvas.addEventListener('touchstart', function (e) { e.preventDefault(); canvas.focus(); pressStart(); }, { passive: false });
  canvas.addEventListener('touchend', function (e) { e.preventDefault(); release(); }, { passive: false });

  draw();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
