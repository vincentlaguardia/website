  </style>

  <div class="scene" id="scene">
    <div class="wallpaper"></div>
    <div class="windowmoon"></div>
    <div class="painting"></div>
    <div class="crucifix"></div>
    <div class="lamp"></div>
    <div class="baseboard"></div>
    <div class="floor"></div>
    <div class="rug"></div>
    <div class="books"></div>
    <div class="nightstand"></div>
    <div class="pill"></div>
    <div class="candles"></div>
    <div class="salt"></div>
    <div class="bed"><i class="claw"></i><i class="claw"></i></div>
    <div class="figure priest">
      <div class="head"></div>
      <div class="face">• •</div>
      <div class="body"></div>
      <div class="arm"></div>
      <div class="cross"></div>
    </div>
    <div class="figure mother">
      <div class="hair"></div>
      <div class="head"></div>
      <div class="face">• •</div>
      <div class="body"></div>
    </div>
    <div class="figure girl" id="girl">
      <div class="hair"></div>
      <div class="head"></div>
      <div class="face">× ×</div>

      <div class="body"></div>
    </div>

    <div class="spark">✦</div>
    <div class="water-burst" id="water-burst" aria-hidden="true"></div>

    <div class="splash-intro" id="splash-intro">PRESS SPACE TO SPLASH</div>
  </div>
</main>

<script>
  (() => {
    const scene = document.getElementById('scene');
    const intro = document.getElementById('splash-intro');
    const waterBurst = document.getElementById('water-burst');
    const waterSplash = document.getElementById('water-splash');
    const WATER_ANIMATION_DURATION = 420;
    let splashAnimTimer = 0;
    let waterAnimTimer = 0;

    function setThrowState(active) {
      waterBurst.classList.toggle('active', active);
      waterSplash.classList.toggle('active', active);
    }

    function animateThrow() {
      clearTimeout(splashAnimTimer);
      clearTimeout(waterAnimTimer);

      setThrowState(false);
      waterBurst.offsetWidth;
      waterSplash.offsetWidth;
      setThrowState(true);

      scene.classList.add('splashing');
      splashAnimTimer = window.setTimeout(() => scene.classList.remove('splashing'), 180);
      waterAnimTimer = window.setTimeout(() => setThrowState(false), WATER_ANIMATION_DURATION);
    }

    function splashNow() {
      intro.classList.add('dismissed');
      animateThrow();
    }

    document.addEventListener('keydown', (event) => {
      if (event.code !== 'Space') return;
      event.preventDefault();
      splashNow();
    });

    document.title = 'The Exorcist';
  })();
</script>
