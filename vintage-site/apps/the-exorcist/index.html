  <div class="hud"><span>DEMONIC INFLUENCE</span><div class="meter"><i id="meter-fill"></i></div><span id="percent">4%</span></div><div class="scene" id="scene"><div class="wallpaper"></div><div class="windowmoon"></div><div class="painting"></div><div class="crucifix"></div><div class="lamp"></div><div class="baseboard"></div><div class="floor"></div><div class="rug"></div><div class="books"></div><div class="nightstand"></div><div class="pill"></div><div class="candles"></div><div class="salt"></div><div class="bed"><i class="claw"></i><i class="claw"></i></div><div class="figure priest"><div class="head"></div><div class="face">• •</div><div class="body"></div><div class="arm"></div><div class="cross"></div></div><div class="figure mother"><div class="hair"></div><div class="head"></div><div class="face">• •</div><div class="body"></div></div><div class="figure girl" id="girl"><div class="hair"></div><div class="head"></div><div class="face">× ×</div><div class="bruise"></div><div class="body"></div></div><div class="demon"></div><div class="spark">✦</div></div><div class="caption" id="caption" aria-live="polite">Mother: “Father, she keeps changing the Wi-Fi password!”</div><div class="controls"><button class="action" id="pray-button">PRAY (SPACE)</button><button class="action" id="sound-button" aria-pressed="true">SOUND: ON</button><span id="score">Prayers: 0 | Record: 0</span></div>
  <script>(()=>{const scene=document.getElementById('scene'),girl=document.getElementById('girl'),meter=document.getElementById('meter-fill'),pct=document.getElementById('percent'),caption=document.getElementById('caption'),score=document.getElementById('score'),pray=document.getElementById('pray-button'),soundButton=document.getElementById('sound-button');let influence=4,prayers=0,record=0,won=false,last=Date.now(),muted=false,ctx;const lines=['Priest: “THE POWER OF CHRIST COMPELS YOU!”','Demon: “Fine. But I’m taking the Netflix password.”','Mother: “Don’t let her open another browser tab!”','The bed squeaks ominously. It has seen things.','Priest: “Begone, foul pop-up window!”'];function beep(freq,duration,type='square',volume=.035,slide=0){if(muted)return;ctx??=new(window.AudioContext||window.webkitAudioContext)();const osc=ctx.createOscillator(),gain=ctx.createGain();osc.type=type;osc.frequency.setValueAtTime(freq,ctx.currentTime);osc.frequency.linearRampToValueAtTime(Math.max(30,freq+slide),ctx.currentTime+duration);gain.gain.setValueAtTime(volume,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+duration);osc.connect(gain).connect(ctx.destination);osc.start();osc.stop(ctx.currentTime+duration)}function draw(){meter.style.width=influence+'%';meter.style.background=influence>65?'#9d121b':influence>30?'#efc450':'#38a83d';pct.textContent=Math.round(influence)+'%';girl.style.bottom=(27+(influence*.34))+'%';scene.classList.toggle('possessed',influence>42);score.textContent='Prayers: '+prayers+' | Record: '+record}function restart(){influence=4;prayers=0;won=false;pray.textContent='PRAY (SPACE)';caption.textContent='Mother: “Father, she keeps changing the Wi-Fi password!”';beep(360,.08,'square',.025,120);draw()}function prayNow(){if(won)return restart();prayers++;record=Math.max(record,prayers);influence=Math.max(0,influence-5.4);last=Date.now();beep(440,.07,'square',.035,110);scene.classList.add('praying');setTimeout(()=>scene.classList.remove('praying'),180);if(influence<=0){won=true;caption.textContent='✦ EXORCISM COMPLETE! The demon has been sent to AOL dial-up. Press SPACE to replay.';pray.textContent='REBOOT RITUAL';beep(523,.12,'triangle',.05,260);setTimeout(()=>beep(784,.24,'triangle',.05,110),120)}else caption.textContent=lines[prayers%lines.length];draw()}function tick(){if(!won&&Date.now()-last>450){influence=Math.min(100,influence+.75);if(Math.round(influence)%15===0)beep(92,.12,'sawtooth',.018,-35);if(influence>=100){caption.textContent='GAME OVER: The demon installed BonziBuddy. Press SPACE to try again.';won=true;pray.textContent='REBOOT RITUAL';beep(100,.55,'sawtooth',.05,-65)}draw()}requestAnimationFrame(tick)}document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();prayNow()}});pray.addEventListener('click',prayNow);soundButton.addEventListener('click',()=>{muted=!muted;soundButton.textContent=muted?'SOUND: OFF':'SOUND: ON';soundButton.setAttribute('aria-pressed',String(!muted));if(!muted)beep(500,.06)});draw();tick()})();</script>

<script>(()=>{const bg=document.getElementById('bg-audio'),fire=document.getElementById('fire-audio'),screams=document.getElementById('screams-audio'),scene=document.getElementById('scene'),sound=document.getElementById('sound-button');bg.volume=.34;fire.volume=.52;screams.volume=.62;let gameAudioStarted=false,gameAudioPending=false;function soundOn(){return sound.getAttribute('aria-pressed')==='true'}function startGameAudio(restart=false){if(!soundOn())return;if(!restart&&(gameAudioStarted||gameAudioPending))return;if(restart){bg.pause();screams.pause();bg.currentTime=0;screams.currentTime=0;gameAudioStarted=false}gameAudioPending=true;Promise.allSettled([bg.play(),screams.play()]).then(results=>{gameAudioPending=false;gameAudioStarted=results.some(result=>result.status==='fulfilled')})}function syncFire(){const burning=scene.classList.contains('ceiling-fire');if(burning&&soundOn())fire.play().catch(()=>{});else{fire.pause();fire.currentTime=0}requestAnimationFrame(syncFire)}window.addEventListener('keydown',e=>{if(e.code==='Space')startGameAudio()},true);sound.addEventListener('click',()=>{if(soundOn()){startGameAudio();if(scene.classList.contains('ceiling-fire'))fire.play().catch(()=>{})}else{bg.pause();fire.pause();screams.pause()}});syncFire()})();</script>
<script>(()=>{const scene=document.getElementById('scene'),girl=document.getElementById('girl'),pct=document.getElementById('percent'),meter=document.getElementById('meter-fill'),caption=document.getElementById('caption'),sound=document.getElementById('sound-button'),bg=document.getElementById('bg-audio'),fire=document.getElementById('fire-audio');const started=performance.now();let ended=false,prayers=0;function audioOn(){return sound.getAttribute('aria-pressed')==='true'}function pray(){if(ended)return;prayers++;scene.classList.add('praying');setTimeout(()=>scene.classList.remove('praying'),150);caption.textContent=['Priest: “KEEP PRAYING. THE CLOCK DOES NOT CARE.”','Mother: “She is still going up, Father.”','Priest: “I am praying at maximum Windows 95.”','Demon: “Your spacebar has no authority here.”'][prayers%4]}const oldButton=document.getElementById('pray-button'),button=oldButton.cloneNode(true);oldButton.replaceWith(button);button.addEventListener('click',pray);document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();e.stopImmediatePropagation();pray()}},true);function timeline(now){const seconds=(now-started)/1000,climb=Math.min(seconds/50,1),burning=seconds>=50&&seconds<60;girl.style.bottom=(27+climb*34)+'%';pct.textContent=Math.round(climb*100)+'%';meter.style.width=(climb*100)+'%';meter.style.background=burning?'#9d121b':climb>.6?'#efc450':'#38a83d';scene.classList.toggle('possessed',climb>.42);scene.classList.toggle('ceiling-fire',burning);if(burning&&audioOn())fire.play().catch(()=>{});if(!burning){fire.pause();fire.currentTime=0}if(seconds>=60&&!ended){ended=true;scene.classList.remove('ceiling-fire');fire.pause();fire.currentTime=0;bg.pause();caption.textContent='60 SECONDS COMPLETE. The room is toast. Press refresh to run the ritual again.';button.textContent='TIME EXPIRED'}if(!ended)requestAnimationFrame(timeline)}requestAnimationFrame(timeline)})();</script>

<script>(()=>{const scene=document.getElementById('scene'),pct=document.getElementById('percent'),caption=document.getElementById('caption');let wasBurning=false;function watch(){const burning=pct.textContent==='100%';if(burning&&!wasBurning){scene.classList.add('ceiling-fire');caption.textContent='CEILING BREACH! The room has burst into holy flames. Press SPACE to reboot the ritual.';wasBurning=true}if(!burning&&wasBurning){scene.classList.remove('ceiling-fire');wasBurning=false}requestAnimationFrame(watch)}watch()})();</script>
