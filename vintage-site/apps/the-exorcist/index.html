<script>
  (() => {
    const scene = document.getElementById('scene');
    const intro = document.getElementById('splash-intro');
    const waterBurst = document.getElementById('water-burst');
    const waterSplash = document.getElementById('water-splash');
    const splashCounter = document.getElementById('splash-counter');
    const backgroundSound = new Audio('./powerofchrist.mp3');
    const waterAnimationDuration = 520;
    const MIN_GAIN_EPSILON = 0.0001;
    let splashAnimTimer = 0;
    let waterAnimTimer = 0;
    let hitTimer = 0;
    let splashCount = 0;
    let backgroundStarted = false;
    let splashFxContext = null;

    backgroundSound.preload = 'auto';
    backgroundSound.volume = 0.72;
    scene.classList.add('possessed', 'ceiling-fire');

    function setThrowState(active) {
      waterBurst.classList.toggle('active', active);
      waterSplash.classList.toggle('active', active);
    }

    function startBackgroundSound() {
      if (backgroundStarted) return;
      backgroundStarted = true;

      const playPromise = backgroundSound.play();
      if (playPromise && typeof playPromise.catch === 'function') {
        playPromise.catch((error) => {
          console.warn('exorcist background playback failed', error);
        });
      }
    }

    function playSplashSound() {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) return;

      if (!splashFxContext) {
        splashFxContext = new AudioCtx();
      }

      const playBurst = () => {
        const now = splashFxContext.currentTime;
        const output = splashFxContext.createGain();
        output.gain.setValueAtTime(MIN_GAIN_EPSILON, now);
        output.gain.exponentialRampToValueAtTime(0.22, now + 0.01);
        output.gain.exponentialRampToValueAtTime(MIN_GAIN_EPSILON, now + 0.18);
        output.connect(splashFxContext.destination);

        const high = splashFxContext.createOscillator();
        high.type = 'triangle';
        high.frequency.setValueAtTime(880, now);
        high.frequency.exponentialRampToValueAtTime(280, now + 0.18);
        high.connect(output);
        high.onended = () => high.disconnect();
        high.start(now);
        high.stop(now + 0.18);

        const low = splashFxContext.createOscillator();
        low.type = 'sine';
        low.frequency.setValueAtTime(410, now);
        low.frequency.exponentialRampToValueAtTime(150, now + 0.18);
        low.connect(output);
        low.onended = () => {
          low.disconnect();
          output.disconnect();
        };
        low.start(now);
        low.stop(now + 0.18);
      };

      if (splashFxContext.state === 'suspended') {
        splashFxContext.resume().then(playBurst).catch((error) => {
          console.warn('exorcist splash effect resume failed', error);
        });
        return;
      }

      playBurst();
    }

    function reactToHolyWater() {
      clearTimeout(hitTimer);
      scene.classList.add('hit-by-water');
      hitTimer = window.setTimeout(() => scene.classList.remove('hit-by-water'), 220);
    }

    function animateThrow() {
      clearTimeout(splashAnimTimer);
      clearTimeout(waterAnimTimer);

      setThrowState(false);
      waterBurst.offsetWidth;
      waterSplash.offsetWidth;
      setThrowState(true);

      scene.classList.add('splashing');
      splashAnimTimer = window.setTimeout(() => scene.classList.remove('splashing'), 180);
      waterAnimTimer = window.setTimeout(() => setThrowState(false), waterAnimationDuration);
    }

    function splashNow() {
      intro.classList.add('dismissed');
      startBackgroundSound();
      splashCount += 1;
      splashCounter.textContent = String(splashCount);
      playSplashSound();
      animateThrow();
      reactToHolyWater();
    }

    document.addEventListener('keydown', (event) => {
      if (event.code !== 'Space') return;
      event.preventDefault();
      splashNow();
    });

    document.title = 'The Exorcist';
  })();
</script>
