<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Donkey Kong Country</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #game { width: 100%; height: 100%; }
    #status {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.92);
      color: #e6e6e6;
      font-family: Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      text-align: center;
      z-index: 9999;
    }
    #status.error { color: #ff8e8e; }
    #status.hidden { display: none; }
    #rom-btn {
      display: none;
      margin-top: 16px;
      padding: 10px 22px;
      background: #c0392b;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 15px;
      cursor: pointer;
    }
    #rom-btn:hover { background: #e74c3c; }
  </style>
</head>
<body>
  <div id="game"></div>
  <div id="status">
    <div>
      <span id="status-text">Preparing Donkey Kong Country…</span>
      <br>
      <button id="rom-btn">Browse for ROM file…</button>
    </div>
  </div>
  <input id="rom-picker" type="file" accept=".sfc,.smc,.fig,.swc,.zip,application/octet-stream" aria-label="ROM file picker" hidden>
  <script>
    const ROM_URL = '/roms/dkc.sfc';
    const EMULATOR_DATA_BASE_URL = 'https://cdn.emulatorjs.org/latest/data/';
    const MIN_ROM_SIZE_BYTES = 1024;
    const statusEl = document.getElementById('status');
    const statusTextEl = document.getElementById('status-text');
    const gameEl = document.getElementById('game');
    const romPickerEl = document.getElementById('rom-picker');
    const romBtnEl = document.getElementById('rom-btn');
    romBtnEl.addEventListener('click', () => romPickerEl.click());
    let currentRomBlobUrl = null;

    const setStatus = (message, isError = false, showPickerBtn = false) => {
      statusTextEl.textContent = message;
      statusEl.classList.toggle('error', isError);
      statusEl.classList.remove('hidden');
      romBtnEl.style.display = showPickerBtn ? 'inline-block' : 'none';
    };

    const hideStatus = () => {
      statusEl.classList.add('hidden');
      romBtnEl.style.display = 'none';
    };

    const showRomPickerOption = () => {
      setStatus('ROM file not found. Please click the button below to select your local ROM file.', true, true);
    };

    const createRomBlobUrl = (romBytes) => {
      if (currentRomBlobUrl) {
        URL.revokeObjectURL(currentRomBlobUrl);
      }
      currentRomBlobUrl = URL.createObjectURL(new Blob([romBytes], { type: 'application/octet-stream' }));
      return currentRomBlobUrl;
    };

    const validateMinimumRomSize = (romBytes, errorMessagePrefix) => {
      if (romBytes.byteLength < MIN_ROM_SIZE_BYTES) {
        throw new Error(`${errorMessagePrefix} (minimum: ${MIN_ROM_SIZE_BYTES} bytes, received: ${romBytes.byteLength} bytes)`);
      }
    };

    const loadRomFromBytes = (romBytes) => {
      setStatus('Loading emulator runtime…');
      loadEmulator(createRomBlobUrl(romBytes));
    };

    const decodeHeader = (bytes) => {
      try {
        return new TextDecoder('utf-8').decode(bytes).trimStart().toLowerCase();
      } catch {
        return '';
      }
    };

    const HTML_FALLBACK_PREFIXES = ['<!doctype html', '<html', '<head', '<body'];

    const isHtmlFallbackResponse = (contentType, bytes) => {
      if ((contentType || '').toLowerCase().includes('text/html')) return true;
      const header = decodeHeader(bytes);
      return HTML_FALLBACK_PREFIXES.some((prefix) => header.startsWith(prefix));
    };

    const monitorGameBoot = () => {
      const startedAt = Date.now();
      const intervalId = setInterval(() => {
        const hasCanvas = !!gameEl.querySelector('canvas');
        if (hasCanvas) {
          clearInterval(intervalId);
          hideStatus();
          return;
        }
        if (Date.now() - startedAt > 15000) {
          clearInterval(intervalId);
          setStatus('Emulator started but no frame rendered. Confirm /roms/dkc.sfc is a valid SNES ROM and EmulatorJS core assets are reachable.', true);
        }
      }, 500);
    };

    const loadEmulator = (romBlobUrl) => {
      window.EJS_player = '#game';
      window.EJS_core = 'snes9x';
      window.EJS_gameUrl = romBlobUrl;
      window.EJS_pathtodata = EMULATOR_DATA_BASE_URL;
      window.EJS_startOnLoaded = true;
      window.EJS_color = '#1a1a2e';

      const loaderScript = document.createElement('script');
      loaderScript.src = `${EMULATOR_DATA_BASE_URL}loader.js`;
      loaderScript.onload = () => {
        setStatus('Launching emulator…');
        monitorGameBoot();
      };
      loaderScript.onerror = () => {
        setStatus('Failed to load EmulatorJS runtime. Please retry and verify CDN access to EmulatorJS assets.', true);
      };
      document.body.appendChild(loaderScript);
    };

    const start = async () => {
      try {
        setStatus('Checking game ROM…');
        const romResponse = await fetch(ROM_URL);
        if (!romResponse.ok) {
          if (romResponse.status === 404) {
            showRomPickerOption();
            return;
          }
          throw new Error(`ROM request failed (${romResponse.status}).`);
        }

        const contentType = romResponse.headers.get('content-type') || '';
        const romBytes = await romResponse.arrayBuffer();
        const headerBytes = new Uint8Array(romBytes.slice(0, 256));

        validateMinimumRomSize(romBytes, 'ROM payload is unexpectedly small');
        if (isHtmlFallbackResponse(contentType, headerBytes)) {
          throw new Error('ROM URL returned HTML instead of binary data (likely routing fallback).');
        }

        loadRomFromBytes(romBytes);
      } catch (error) {
        setStatus(`Donkey Kong failed to start: ${error.message}`, true);
      }
    };

    romPickerEl.addEventListener('change', async (event) => {
      const selectedFile = event.target.files[0];
      if (!selectedFile) return;

      try {
        const romBytes = await selectedFile.arrayBuffer();
        validateMinimumRomSize(romBytes, 'Selected ROM payload is unexpectedly small');
        loadRomFromBytes(romBytes);
      } catch (error) {
        setStatus(`Donkey Kong failed to start: ${error.message}`, true);
      }
    });

    window.addEventListener('beforeunload', () => {
      if (currentRomBlobUrl) {
        URL.revokeObjectURL(currentRomBlobUrl);
      }
    });

    start();
  </script>
</body>
</html>
