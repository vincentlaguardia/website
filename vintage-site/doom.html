<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DOOM</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 12px;
    min-height: 100vh;
    font-family: Tahoma, "MS Sans Serif", Geneva, sans-serif;
    font-size: 12px;
    background: #008080;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  /* Win98-style bevel */
  .bevel-out {
    background: #c0c0c0;
    box-shadow:
      inset -1px -1px 0 #0a0a0a,
      inset  1px  1px 0 #ffffff,
      inset -2px -2px 0 #808080,
      inset  2px  2px 0 #dfdfdf;
  }

  .doom-window {
    width: min(780px, calc(100vw - 16px));
  }

  .titlebar {
    height: 20px;
    background: linear-gradient(90deg, #0a246a, #a6caf0 90%);
    color: #fff; font-weight: bold; font-size: 12px;
    display: flex; align-items: center; padding: 0 4px; gap: 6px;
  }

  .win-buttons {
    margin-left: auto; display: flex; gap: 2px;
  }
  .win-btn {
    width: 16px; height: 14px; line-height: 14px; text-align: center;
    background: #c0c0c0; color: #000; font-size: 11px; cursor: default;
    box-shadow:
      inset -1px -1px 0 #0a0a0a,
      inset  1px  1px 0 #ffffff,
      inset -2px -2px 0 #808080,
      inset  2px  2px 0 #dfdfdf;
  }

  .menubar {
    background: #c0c0c0;
    border-bottom: 1px solid #808080;
    padding: 2px 4px;
    display: flex; gap: 8px;
    -webkit-user-select: none; user-select: none;
  }
  .menubar span { padding: 1px 6px; cursor: default; }

  .infobar {
    background: #c0c0c0;
    padding: 4px 8px;
    border-bottom: 1px solid #808080;
    font-size: 11px;
    color: #000;
  }

  /* Game frame — 4:3 aspect ratio */
  .doom-content {
    background: #000;
    position: relative;
    aspect-ratio: 4 / 3;
    overflow: hidden;
  }

  .doom-iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  .statusbar {
    background: #c0c0c0;
    border-top: 2px solid #808080;
    padding: 3px 8px;
    font-size: 11px;
    display: flex; align-items: center; gap: 8px;
    -webkit-user-select: none; user-select: none;
  }
  .statusbar a { color: #000080; text-decoration: none; }
  .statusbar a:hover { text-decoration: underline; }

  /* Responsive: on very small screens keep the iframe usable */
  @media (max-width: 480px) {
    body { padding: 4px; justify-content: flex-start; }
    .doom-window { width: 100%; }
    .doom-content { aspect-ratio: auto; height: 260px; }
  }
</style>
</head>
<body>
<div class="doom-window bevel-out">
  <div class="titlebar">
    <span role="img" aria-label="Game">🎮</span>
    <span>DOOM — WebDOOM</span>
    <div class="win-buttons" aria-hidden="true">
      <div class="win-btn">_</div>
      <div class="win-btn">&#9633;</div>
      <div class="win-btn">&times;</div>
    </div>
  </div>
  <div class="menubar">
    <span>File</span><span>View</span><span>Help</span>
  </div>
  <div class="infobar">
    <span role="img" aria-label="Warning">⚠</span>&nbsp; Click inside the game to lock mouse &amp; focus &nbsp;·&nbsp;
    Arrow keys or WASD to move &nbsp;·&nbsp;
    Ctrl to fire &nbsp;·&nbsp;
    Best experienced on desktop — mobile controls are limited
  </div>
  <div class="doom-content">
    <iframe
      class="doom-iframe"
      src="https://ustymukhman.github.io/WebDOOM/public/"
      title="DOOM (WebDOOM by UstymUkhman)"
      allow="autoplay; pointer-lock"
      loading="lazy"
    ></iframe>
  </div>
  <div class="statusbar">
    <a href="/">← back to desktop</a>
    <span>|</span>
    <span>powered by <a href="https://github.com/UstymUkhman/WebDOOM" target="_blank" rel="noopener noreferrer">UstymUkhman/WebDOOM</a></span>
  </div>
</div>
</body>
</html>
